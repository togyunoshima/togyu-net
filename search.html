<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>戦歴検索 | 徳之島闘牛サイト</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      padding:20px 10px 60px;
      background:#050505;
      color:#eee;
      font-family:'Kaisei Tokumin', serif;
    }
    .container{
      max-width:900px;
      margin:0 auto;
    }
    .top-nav{
      max-width:1100px;
      margin:0 auto 18px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }
    .top-nav a{
      display:block;
      text-align:center;
      padding:12px 8px;
      background:#111;
      border:1px solid #333;
      color:#fff;
      text-decoration:none;
      font-weight:800;
      font-size:0.92rem;
    }
    .top-nav a:hover{ background:#e60000; }
    .top-nav a.active{
      background:#1a1a1a;
      border-color:#f1c40f;
      color:#f1c40f;
    }
    h1{
      text-align:center;
      font-family:'Yuji Syuku', serif;
      font-size:clamp(2rem, 7vw, 3.8rem);
      color:#fff;
      margin:20px 0 30px;
      text-shadow:3px 3px 0 #e60000,-1px -1px 0 #e60000,1px -1px 0 #e60000,-1px 1px 0 #e60000,1px 1px 0 #e60000;
      letter-spacing:2px;
    }
    .search-box{
      background:rgba(20,20,20,0.75);
      border:1px solid #222;
      padding:24px;
      margin-bottom:24px;
      text-align:center;
    }
    .search-box input{
      width:min(100%, 420px);
      padding:14px 16px;
      font-size:1rem;
      border:1px solid #333;
      background:#0d0d0d;
      color:#fff;
      font-family:'Kaisei Tokumin', serif;
      box-sizing:border-box;
    }
    .search-box button{
      margin-top:14px;
      padding:12px 22px;
      border:none;
      background:#e60000;
      color:#fff;
      font-size:1rem;
      font-family:'Kaisei Tokumin', serif;
      cursor:pointer;
    }
    .result-list{
      display:grid;
      gap:14px;
    }
    .result-card{
      background:rgba(20,20,20,0.75);
      border:1px solid #222;
      padding:18px;
    }
    .result-name{
      font-size:1.2rem;
      font-weight:800;
      color:#fff;
      margin-bottom:8px;
      line-height:1.6;
    }
    .result-alias{
      color:#bbb;
      font-size:0.92rem;
      line-height:1.8;
      margin-bottom:12px;
    }
    .result-link{
      display:inline-block;
      color:#fff;
      text-decoration:none;
      background:#111;
      border:1px solid #333;
      padding:8px 14px;
      font-size:0.95rem;
    }
    .result-link:hover{
      background:#e60000;
    }
    .empty{
      text-align:center;
      color:#999;
      margin-top:24px;
      line-height:1.8;
    }
    @media (max-width:700px){
      .top-nav{ gap:4px; margin:0 auto 12px; }
      .top-nav a{ padding:9px 4px; font-size:0.62rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="top-nav">
      <a href="index.html">ホーム</a>
      <a href="programitiran.html">対戦表</a>
      <a href="search.html" class="active">戦歴検索</a>
      <a href="prediction.html">予想</a>
    </nav>

    <h1>戦歴検索</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="牛名・元名を入力">
      <br>
      <button id="searchButton">検索</button>
    </div>

    <div class="result-list" id="resultList"></div>
    <div class="empty" id="emptyMessage">牛名を入力して検索してください。</div>
  </div>

  <script>
    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");
    const resultList = document.getElementById("resultList");
    const emptyMessage = document.getElementById("emptyMessage");

    let bulls = [];

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeText(text) {
      return String(text || "").toLowerCase().replace(/\s+/g, "").trim();
    }

    function getSearchTargets(bull) {
      const targets = [];
      if (bull.display_name) targets.push(bull.display_name);
      if (bull.exact_title) targets.push(bull.exact_title);

      if (Array.isArray(bull.former_names)) {
        bull.former_names.forEach(name => {
          if (name) targets.push(name);
          if (name && name.startsWith("元")) {
            targets.push(name.replace(/^元\s*/, "").replace(/^元/, ""));
          }
        });
      }
      return targets;
    }

    function formatFormerNames(bull){
      if(!Array.isArray(bull.former_names) || bull.former_names.length === 0){
        return "";
      }

      const names = bull.former_names.map(name => {
        let text = String(name || "").trim();

        if(text.startsWith("元沖縄 ")) return text;
        if(text.startsWith("沖縄 ")) return "元沖縄 " + text.replace(/^沖縄\s*/, "");
        if(text.startsWith("元 ")) return text.replace(/^元\s*/, "").trim();
        if(text.startsWith("元")) return text.replace(/^元/, "").trim();
        return text;
      });

      return `（元: ${names.join(" / ")}）`;
    }

    function renderResults(list) {
      resultList.innerHTML = "";

      if (list.length === 0) {
        emptyMessage.textContent = "該当する牛が見つかりませんでした。";
        return;
      }

      emptyMessage.textContent = "";

      resultList.innerHTML = list.map(bull => `
        <div class="result-card">
          <div class="result-name">${escapeHtml(bull.display_name || "")}</div>
          ${formatFormerNames(bull) ? `<div class="result-alias">${escapeHtml(formatFormerNames(bull))}</div>` : ""}
          <a class="result-link" href="bull.html?id=${encodeURIComponent(bull.id)}">戦歴を見る</a>
        </div>
      `).join("");
    }

    function searchBulls() {
      const keyword = normalizeText(searchInput.value);

      if (!keyword) {
        resultList.innerHTML = "";
        emptyMessage.textContent = "牛名を入力して検索してください。";
        return;
      }

      const filtered = bulls.filter(bull => {
        const targets = getSearchTargets(bull);
        return targets.some(target => normalizeText(target).includes(keyword));
      });

      renderResults(filtered);
    }

    fetch("data/bulls.json")
      .then(res => res.json())
      .then(data => {
        bulls = data;
      })
      .catch(() => {
        emptyMessage.textContent = "牛データの読み込みに失敗しました。";
      });

    searchButton.addEventListener("click", searchBulls);
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchBulls();
    });
  </script>
</body>
</html>
