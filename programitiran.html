<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対戦表 | 徳之島闘牛サイト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@800&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif; /* 表は読みやすさ重視 */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 魂の筆文字タイトル（英語なし・1行） */
        .page-title {
            font-family: 'Kaisei Tokumin', serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 10vw, 4rem);
            margin: 20px 0 30px 0;
            color: #ffffff;
            text-shadow: 0.05em 0.05em 0px #ff0000;
            text-align: center;
            white-space: nowrap;
        }

        /* 画像通りの赤いヘッダー表 */
        .table-container {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            background-color: #000;
            border: 1px solid #333;
        }

        .table-header {
            background-color: #e60000; /* 赤い帯 */
            color: white;
        }

        th, td {
            padding: 15px 10px;
            border: 1px solid #333;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 800;
        }

        .date-col {
            color: #f1c40f; /* 日付の黄色 */
            width: 80px;
        }

        .result-btn {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 5px 15px;
            font-weight: 900;
            cursor: pointer;
        }

        .back-home {
            margin-top: 40px;
            text-decoration: none;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 40px;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.05);
        }

        /* c○を togyu.net に統一 */
        .footer-text {
            margin-top: 50px;
            margin-bottom: 20px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h1 class="page-title">対戦表</h1>

    <table class="table-container">
        <thead>
            <tr class="table-header">
                <th>開催日</th>
                <th>大会名（番組）</th>
                <th>結果</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="date-col">26.03.08</td>
                <td>玉城千春(Kiroro)スペシャルライブ＆<br>平成19・20年生卒業記念ナイター大会</td>
                <td><button class="result-btn">結果</button></td>
            </tr>
            <tr>
                <td class="date-col">26.03.07</td>
                <td>卒業記念ナイター闘牛大会</td>
                <td><button class="result-btn">結果</button></td>
            </tr>
            <tr>
                <td class="date-col">26.01.03</td>
                <td>第42回 徳之島全島一・ミニ軽量級優勝旗争奪戦<br>徳之島町大会</td>
                <td><button class="result-btn">結果</button></td>
            </tr>
            <tr>
                <td class="date-col">26.01.02</td>
                <td>第42回 徳之島中量級優勝旗争奪戦<br>平成2年・3年厄払い闘牛大会</td>
                <td><button class="result-btn">結果</button></td>
            </tr>
        </tbody>
    </table>

    <a href="index.html" class="back-home">ホームへ戻る</a>

    <div class="footer-text">© 2026 togyu.net</div>

</body>
</html>
