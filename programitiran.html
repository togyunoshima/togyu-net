<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対戦表 | 徳之島闘牛サイト</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      padding:20px 10px 60px;
      background:#050505;
      color:#eee;
      font-family:'Kaisei Tokumin', serif;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    h1{
      font-family:'Yuji Syuku', serif;
      font-size:clamp(2rem, 7vw, 3.8rem);
      color:#fff;
      margin:20px 0 30px;
      text-align:center;
      text-shadow:3px 3px 0 #e60000,-1px -1px 0 #e60000,1px -1px 0 #e60000,-1px 1px 0 #e60000,1px 1px 0 #e60000;
      letter-spacing:2px;
    }

    .back-link{
      display:inline-block;
      margin-bottom:20px;
      color:#fff;
      text-decoration:none;
      background:#111;
      border:1px solid #333;
      padding:10px 14px;
    }

    .back-link:hover{
      background:#e60000;
      border-color:#e60000;
    }

    .table-wrap{
      background:rgba(20,20,20,0.75);
      border:1px solid #222;
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:880px;
    }

    th, td{
      border:1px solid #333;
      padding:12px 10px;
      text-align:center;
      vertical-align:middle;
      font-size:0.95rem;
      line-height:1.6;
    }

    th{
      background:#111;
      color:#f1c40f;
      font-weight:800;
    }

    .section-row td{
      background:#0f0f0f;
      color:#fff;
      font-weight:800;
      font-size:1rem;
      border-top:2px solid #666;
      border-bottom:2px solid #666;
      padding:10px;
    }

    .program-link,
    .result-link{
      color:#9ecbff;
      text-decoration:underline;
    }

    .program-link:hover,
    .result-link:hover{
      color:#fff;
    }

    .result-none{
      color:#999;
    }

    .note{
      color:#888;
      text-align:center;
      margin-top:18px;
      font-size:0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← ホームへ戻る</a>

    <h1>対戦表</h1>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width: 22%;">日付</th>
            <th>大会名(プログラム)</th>
            <th style="width: 12%;">結果</th>
          </tr>
        </thead>
        <tbody id="programBody"></tbody>
      </table>
    </div>

    <div class="note">※ 今の徳之島闘牛サイトの一覧仕様に近い形で表示しています。</div>
  </div>

  <script>
    const bodyEl = document.getElementById("programBody");

    function formatJapaneseDate(dateStr){
      if(!dateStr) return "";
      const [y, m, d] = dateStr.split("-");
      return `${Number(y)}年${Number(m)}月${Number(d)}日`;
    }

    function makeSectionLabel(dateStr){
      if(!dateStr) return "";
      const [y, m] = dateStr.split("-");
      return `${Number(y)}年${Number(m)}月場所`;
    }

    function fallbackTitle(program){
      const dateStr = formatJapaneseDate(program.date);
      return `${dateStr} 闘牛大会`;
    }

    fetch("data/programs.json")
      .then(res => res.json())
      .then(programs => {
        const sorted = [...programs].sort((a, b) => b.id.localeCompare(a.id));

        let html = "";
        let currentSection = "";

        sorted.forEach(program => {
          const sectionLabel = makeSectionLabel(program.date);

          if(sectionLabel !== currentSection){
            currentSection = sectionLabel;
            html += `
              <tr class="section-row">
                <td colspan="3">${sectionLabel}</td>
              </tr>
            `;
          }

          const dateText = formatJapaneseDate(program.date);
          const programTitle = program.title ? program.title : fallbackTitle(program);

          const programLink = `https://togyunoshima.github.io/togyu-net/program.html?id=${program.id}`;
          const resultLink = `https://togyunoshima.github.io/togyu-net/result.html?id=${program.id}`;

          html += `
            <tr>
              <td>${dateText}</td>
              <td>
                <a class="program-link" href="${programLink}">
                  ${programTitle}
                </a>
              </td>
              <td>
                <a class="result-link" href="${resultLink}">結果</a>
              </td>
            </tr>
          `;
        });

        bodyEl.innerHTML = html;
      })
      .catch(err => {
        bodyEl.innerHTML = `
          <tr>
            <td colspan="3" style="color:#ff8080;">大会データの読み込みに失敗しました。</td>
          </tr>
        `;
        console.error(err);
      });
  </script>
</body>
</html>
