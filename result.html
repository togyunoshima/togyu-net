<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>結果 | 徳之島闘牛サイト</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
 <style>
  body{
    margin:0;
    padding:14px 8px 40px;
    background:#050505;
    color:#eee;
    font-family:'Kaisei Tokumin', serif;
  }

  .container{
    max-width:1100px;
    margin:0 auto;
  }

  .back-link{
    display:inline-block;
    margin-bottom:16px;
    color:#fff;
    text-decoration:none;
    background:#111;
    border:1px solid #333;
    padding:10px 14px;
    font-size:0.92rem;
  }

  .back-link:hover{
    background:#e60000;
    border-color:#e60000;
  }

  h1{
    text-align:center;
    font-family:'Yuji Syuku', serif;
    font-size:clamp(1.35rem, 4.8vw, 3rem);
    color:#fff;
    margin:10px 0 22px;
    text-shadow:3px 3px 0 #e60000,-1px -1px 0 #e60000,1px -1px 0 #e60000,-1px 1px 0 #e60000,1px 1px 0 #e60000;
    letter-spacing:0.04em;
    line-height:1.45;
    white-space:normal;
    word-break:keep-all;
    overflow-wrap:anywhere;
  }

  .event-meta{
    background:rgba(20,20,20,0.8);
    border:1px solid #222;
    margin-bottom:20px;
  }

  .meta-row{
    display:grid;
    grid-template-columns:92px 1fr;
    border-bottom:1px solid #333;
  }

  .meta-row:last-child{
    border-bottom:none;
  }

  .meta-label{
    background:#111;
    color:#f1c40f;
    font-weight:800;
    padding:12px 12px;
    font-size:0.9rem;
  }

  .meta-value{
    padding:12px 12px;
    color:#fff;
    font-size:0.92rem;
    line-height:1.6;
    white-space:normal;
    word-break:break-word;
  }

  .program-table-wrap{
    background:rgba(20,20,20,0.8);
    border:1px solid #222;
    overflow-x:auto;
  }

  table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    min-width:700px;
  }

  th, td{
    border:1px solid #333;
    text-align:center;
    vertical-align:middle;
    padding:0;
  }

  th{
    background:#111;
    color:#fff;
    font-weight:800;
    padding:12px 6px;
    font-size:0.92rem;
  }

  th.east-head{
    background:#b60000;
  }

  th.west-head{
    background:#d9d9d9;
    color:#222;
  }

  th.rank-head{
    background:#222;
    color:#f1c40f;
  }

  th.area-head{
    background:#222;
    color:#fff;
    width:11%;
  }

  td.area{
    background:#0a0a0a;
    color:#fff;
    font-weight:700;
    font-size:0.88rem;
    width:11%;
    padding:12px 4px;
    line-height:1.5;
    word-break:break-word;
  }

  td.east,
  td.west{
    width:30%;
    background:#050505;
    padding:14px 6px;
  }

  td.rank{
    width:18%;
    background:#0f0f0f;
    padding:14px 4px;
  }

  .subtext{
    color:#f1c40f;
    font-size:0.72rem;
    line-height:1.5;
    margin-bottom:8px;
    font-weight:700;
    white-space:normal;
    word-break:break-word;
  }

  .bull-name{
    color:#fff;
    font-size:1.2rem;
    line-height:1.35;
    font-weight:800;
    margin-bottom:8px;
    white-space:normal;
    word-break:break-word;
  }

  .bull-note{
    color:#ddd;
    font-size:0.72rem;
    line-height:1.55;
    white-space:normal;
    word-break:break-word;
  }

  .bull-note a{
    color:#ddd;
    text-decoration:underline;
  }

  .bull-note a:hover{
    color:#fff;
  }

  .rank-name{
    color:#f1c40f;
    font-size:0.9rem;
    font-weight:800;
    line-height:1.5;
    white-space:normal;
    word-break:break-word;
  }

  .match-time-placeholder{
    color:#bbb;
    font-size:0.82rem;
    line-height:1.5;
    margin-top:8px;
    white-space:nowrap;
  }

  .error{
    text-align:center;
    color:#ff8080;
    margin-top:24px;
  }

  .note{
    color:#888;
    text-align:center;
    margin-top:14px;
    font-size:0.8rem;
  }

  @media (max-width: 700px){
    body{
      padding:10px 4px 28px;
    }

    .meta-row{
      grid-template-columns:74px 1fr;
    }

    .meta-label{
      font-size:0.76rem;
      padding:10px 8px;
    }

    .meta-value{
      font-size:0.74rem;
      padding:10px 8px;
      line-height:1.5;
    }

    th{
      font-size:0.7rem;
      padding:10px 4px;
    }

    td.area{
      font-size:0.64rem;
      padding:10px 2px;
      line-height:1.35;
    }

    td.east,
    td.west{
      padding:10px 4px;
    }

    td.rank{
      padding:10px 3px;
    }

    .subtext{
      font-size:0.54rem;
      line-height:1.35;
      margin-bottom:5px;
    }

    .bull-name{
      font-size:0.88rem;
      line-height:1.25;
      margin-bottom:5px;
    }

    .bull-note{
      font-size:0.5rem;
      line-height:1.35;
    }

    .rank-name{
      font-size:0.64rem;
      line-height:1.35;
    }

    .match-time-placeholder{
      font-size:0.6rem;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <a href="programitiran.html" class="back-link">← 対戦表一覧に戻る</a>

    <h1 id="pageTitle">結果</h1>

    <div class="event-meta">
      <div class="meta-row">
        <div class="meta-label">日時</div>
        <div class="meta-value" id="metaDate">読み込み中...</div>
      </div>
      <div class="meta-row">
        <div class="meta-label">場所</div>
        <div class="meta-value" id="metaPlace">読み込み中...</div>
      </div>
      <div class="meta-row">
        <div class="meta-label">主催</div>
        <div class="meta-value" id="metaHost">未設定</div>
      </div>
    </div>

    <div class="result-table-wrap">
      <table>
        <thead>
          <tr>
            <th class="area-head">地区</th>
            <th class="east-head">東方</th>
            <th class="rank-head">番付</th>
            <th class="west-head">西方</th>
            <th class="area-head">地区</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>

    <div class="error" id="error"></div>
    <div class="note">※ 今の徳之島闘牛サイトの結果表示に近い形で表示しています。</div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const programId = params.get("id");

    const pageTitleEl = document.getElementById("pageTitle");
    const metaDateEl = document.getElementById("metaDate");
    const metaPlaceEl = document.getElementById("metaPlace");
    const metaHostEl = document.getElementById("metaHost");
    const bodyEl = document.getElementById("resultBody");
    const errorEl = document.getElementById("error");

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatJapaneseDate(dateStr){
      if(!dateStr) return "";
      const [y, m, d] = dateStr.split("-");
      return `${Number(y)}年${Number(m)}月${Number(d)}日`;
    }

    function getProgramTitle(program){
      if(program && program.title) return program.title;
      if(program && program.date) return `${formatJapaneseDate(program.date)} 闘牛大会 結果`;
      return "結果";
    }

    function normalize(str) {
      return String(str || "")
        .replace(/\s+/g, "")
        .replace(/[（）()]/g, "")
        .trim();
    }

    function getBullSearchTargets(bull) {
      const targets = [];

      if (bull.display_name) targets.push(bull.display_name);
      if (bull.name) targets.push(bull.name);
      if (bull.exact_title) targets.push(bull.exact_title);

      if (Array.isArray(bull.former_names)) {
        bull.former_names.forEach(name => {
          if (name) {
            targets.push(name);
            targets.push("元 " + name);
            targets.push("元" + name);
          }
        });
      }

      return [...new Set(targets.map(normalize).filter(Boolean))];
    }

    function findBullIdByName(name, bulls) {
      const target = normalize(name);
      const found = bulls.find(bull => getBullSearchTargets(bull).includes(target));
      return found ? found.id : null;
    }

    function makeRecordHtml(name, text, bulls){
      const noteText = String(text || "").trim();

      if(!noteText){
        return "";
      }

      if(noteText.includes("デビュー戦")){
        return `<div class="bull-note">${escapeHtml(noteText)}</div>`;
      }

      const hasRecord =
        /[0-9０-９]+勝/.test(noteText) ||
        /[0-9０-９]+敗/.test(noteText) ||
        /引分/.test(noteText);

      if(!hasRecord){
        return `<div class="bull-note">${escapeHtml(noteText)}</div>`;
      }

      const bullId = findBullIdByName(name, bulls);

      if (!bullId) {
        return `<div class="bull-note">${escapeHtml(noteText)}</div>`;
      }

      return `
        <div class="bull-note">
          <a href="bull.html?id=${encodeURIComponent(bullId)}">
            ${escapeHtml(noteText)}
          </a>
        </div>
      `;
    }

    function formatRank(rank){
      const text = String(rank || "").trim();
      if(!text) return "VS";
      return escapeHtml(text).replaceAll(" / ", "<br>").replaceAll("/", "<br>");
    }

    Promise.all([
      fetch("data/programs.json").then(res => res.json()),
      fetch("data/matches.json").then(res => res.json()),
      fetch("data/bulls.json").then(res => res.json())
    ])
    .then(([programs, matches, bulls]) => {
      const program = programs.find(p => p.id === programId);
      const list = matches.filter(m => m.program === programId);

      if (!programId) {
        errorEl.textContent = "大会IDがありません。";
        return;
      }

      if (program) {
        pageTitleEl.textContent = getProgramTitle(program);
        metaDateEl.textContent = formatJapaneseDate(program.date) || "未設定";
        metaPlaceEl.textContent = program.location || program.place || "未設定";
        metaHostEl.textContent = program.host || "未設定";
      } else {
        pageTitleEl.textContent = `${programId} 結果`;
        metaDateEl.textContent = "未設定";
        metaPlaceEl.textContent = "未設定";
      }

      if (list.length === 0) {
        bodyEl.innerHTML = `
          <tr>
            <td colspan="5" style="padding:20px;color:#ff8080;">この大会の結果データはまだありません。</td>
          </tr>
        `;
        return;
      }

      const html = list.map(match => {
        const eastArea = match.east_area || "";
        const westArea = match.west_area || "";
        const eastName = match.east || "";
        const westName = match.west || "";
        const rank = match.rank || "";
        const time = match.time || "";
        const eastSub = match.east_sub || "";
        const eastNote = match.east_note || "";
        const westSub = match.west_sub || "";
        const westNote = match.west_note || "";
        const winner = match.winner || "";
        const isDraw = match.draw === true || match.result === "draw";

        let eastMark = "";
        let westMark = "";

        if(isDraw){
          eastMark = "△";
          westMark = "△";
        }else{
          if(normalize(winner) === normalize(eastName)){
            eastMark = "〇";
          }
          if(normalize(winner) === normalize(westName)){
            westMark = "〇";
          }
        }

        return `
          <tr>
            <td class="area">${escapeHtml(eastArea)}</td>

            <td class="east">
              <div class="result-mark">${escapeHtml(eastMark)}</div>
              ${eastSub ? `<div class="subtext">${escapeHtml(eastSub)}</div>` : ``}
              <div class="bull-name">${escapeHtml(eastName)}</div>
              ${makeRecordHtml(eastName, eastNote, bulls)}
            </td>

            <td class="rank">
              <div class="rank-name">${formatRank(rank)}</div>
              <div class="match-time">│ ${escapeHtml(time)} │</div>
            </td>

            <td class="west">
              <div class="result-mark">${escapeHtml(westMark)}</div>
              ${westSub ? `<div class="subtext">${escapeHtml(westSub)}</div>` : ``}
              <div class="bull-name">${escapeHtml(westName)}</div>
              ${makeRecordHtml(westName, westNote, bulls)}
            </td>

            <td class="area">${escapeHtml(westArea)}</td>
          </tr>
        `;
      }).join("");

      bodyEl.innerHTML = html;
    })
    .catch(err => {
      errorEl.textContent = "データの読み込みに失敗しました。";
      console.error(err);
    });
  </script>
</body>
</html>
