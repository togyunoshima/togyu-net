<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徳之島闘牛サイト | ホーム</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@800&family=Yuji+Syuku&family=Noto+Sans+JP:wght@900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Kaisei Tokumin', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        /* 荒々しい筆文字と赤×金のグラデーション */
        .main-title {
            font-family: 'Yuji Syuku', serif;
            font-weight: 900;
            font-size: clamp(3rem, 15vw, 6rem);
            margin: 0;
            line-height: 1.1;
            background: linear-gradient(45deg, #b30000 0%, #ffc107 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(179, 0, 0, 0.8);
            letter-spacing: -2px;
        }

        .catchphrase {
            font-size: clamp(0.9rem, 3.5vw, 1.3rem);
            color: #f1c40f;
            margin-top: 15px;
            margin-bottom: 50px;
            letter-spacing: 10px;
            font-weight: 800;
            padding-left: 10px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .nav-item {
            display: block;
            width: 100%;
            max-width: 320px;
            padding: 16px 0;
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.2rem;
            font-weight: 800;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background-color: #e60000;
            border-color: #e60000;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(230, 0, 0, 0.4);
        }

        /* フッター：ドメイン名に変更 */
        .footer-text {
            position: absolute;
            bottom: 30px;
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            color: #444; /* 少し見やすく調整 */
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">徳之島闘牛サイト</div>
    <div class="catchphrase">魂が、咆える。</div>

<div class="footer-text">© togyu.net</div>

</body>
</html>
