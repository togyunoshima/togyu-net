<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徳之島闘牛サイト | ホーム</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        /* --- 基本設定 --- */
        body { 
            margin: 0;
            padding: 10px;
            background-color: #050505; /* 万が一画像が出なくても黒背景を維持 */
            color: #eee; 
            font-family: 'Kaisei Tokumin', serif; 
            text-align: center;
            position: relative;
            min-height: 100vh;
        }

        /* --- 背景画像を「背後」に固定 --- */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 画像パスを正しく設定 */
            background-image: url('IMG_8395.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15; /* 15%の薄さ */
            filter: grayscale(100%);
            z-index: -1; /* 必ずコンテンツの後ろへ */
        }

        /* --- タイトル最上部 --- */
        h1 { 
            font-family: 'Yuji Syuku', serif;
            font-size: clamp(2.2rem, 10vw, 4.8rem);
            color: #fff;
            margin: 30px 0 20px 0;
            text-shadow: 3px 3px 0 #e60000, -1px -1px 0 #e60000, 1px -1px 0 #e60000, -1px 1px 0 #e60000, 1px 1px 0 #e60000;
            letter-spacing: 2px;
        }

        /* --- メニュー --- */
        .header-nav {
            max-width: 950px;
            margin: 0 auto 40px auto;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .nav-item {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border: 1px solid #444;
            padding: 12px 5px;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .nav-item:hover { background-color: #e60000; border-color: #e60000; }
        .nav-item:nth-child(1), .nav-item:nth-child(2), .nav-item:nth-child(3) { grid-column: span 2; }
        .nav-item:nth-child(4), .nav-item:nth-child(5) { grid-column: span 3; }

        /* --- コンテンツエリア --- */
        .section-container {
            max-width: 950px;
            margin: 0 auto 40px auto;
            text-align: left;
        }

        .section-title {
            font-size: 1.2rem;
            color: #f1c40f;
            border-left: 5px solid #e60000;
            padding-left: 15px;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .content-box {
            background: rgba(30, 30, 30, 0.6); /* 少し明るめの半透明 */
            border: 1px solid #333;
            padding: 40px 20px;
            color: #aaa;
            text-align: center;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.3rem; }
            .nav-item { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

</nav>

</div>
