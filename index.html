        /* --- タイトル最上部 --- */
        h1 { 
            font-family: 'Yuji Syuku', serif;
            font-size: clamp(2.2rem, 10vw, 4.8rem);
            color: #fff;
            margin: 30px 0 20px 0;

        .header-nav {
            max-width: 950px;
            margin: 0 auto 30px auto;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .nav-item {
            display: flex;
            justify-content: center;
            align-items: center;

            font-weight: 800;

        .nav-item:nth-child(1), .nav-item:nth-child(2), .nav-item:nth-child(3) { grid-column: span 2; }
        .nav-item:nth-child(4), .nav-item:nth-child(5) { grid-column: span 3; }

        /* --- 各セクションの共通設定 --- */
        .section-container {
            max-width: 950px;
            margin: 0 auto 40px auto;
            text-align: left;
            padding: 0 10px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #f1c40f;
            border-left: 5px solid #e60000;
            padding-left: 15px;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .content-box {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            color: #999;
            text-align: center;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.3rem; }
            .nav-item { font-size: 0.75rem; }
        }
    </style>
</head>
