<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徳之島闘牛アーカイブ | ホーム</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@800&family=Noto+Sans+JP:wght@900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Kaisei Tokumin', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden; /* スマホで画面が揺れないように固定 */
        }

        .container {
            padding: 20px;
            width: 100%;
            max-width: 600px; /* 少し広げて1行を維持しやすく */
            box-sizing: border-box;
        }

        /* 魂のメインタイトル：1行表示を死守 */
        .main-title {
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 900;
            /* vwを使って画面幅に合わせて自動リサイズ（1行に収める） */
            font-size: 13vw; 
            white-space: nowrap; /* 絶対に改行させない */
            margin: 0;
            line-height: 1.2;
            /* 濁りを消すため、パキッとした鮮やかな赤 (#ff0000) を使用 */
            color: #ffffff;
            text-shadow: 0.05em 0.05em 0px #ff0000; 
            letter-spacing: -0.02em;
        }

        /* PCで見るときに大きくなりすぎないよう制限 */
        @media (min-width: 600px) {
            .main-title { font-size: 80px; }
        }

        .catchphrase {
            font-size: clamp(0.8rem, 3.5vw, 1.2rem);
            color: #f1c40f;
            margin-top: 5px;
            margin-bottom: 40px;
            letter-spacing: 0.5em;
            font-weight: 800;
            padding-left: 0.5em;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .nav-item {
            display: block;
            width: 100%;
            max-width: 280px;
            padding: 15px 0;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
            font-weight: 800;
            transition: 0.3s;
        }

        .nav-item:hover {
            background-color: #ff0000;
            border-color: #ff0000;
            transform: scale(1.05);
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            font-family: 'Oswald', sans-serif;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">徳之島闘牛サイト</div>
    <div class="catchphrase">魂が、咆える。</div>

    <nav class="nav-menu">
        <a href="index.html" class="nav-item">ホーム</a>
        <a href="programitiran.html" class="nav-item">対戦表</a>
        <a href="search.html" class="nav-item">戦歴検索</a>
        <a href="prediction.html" class="nav-item">予想ページ</a>
        <a href="champions.html" class="nav-item">徳之島闘牛歴代王者</a>
    </nav>
</div>

<div class="footer-text">© 2026 TOKUNOSHIMA TOGYU ARCHIVE</div>

</body>
</html>
