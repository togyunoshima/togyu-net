<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徳之島闘牛サイト | ホーム</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #050505;
        }

        /* --- 背景画像の固定配置と薄透かし --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('IMG_8395.jpg'); /* アップロードされた画像名 */
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0.15; /* 15%まで透かす */
            filter: grayscale(100%); /* モノクロ加工 */
            z-index: -1;
        }

        body { 
            color: #eee; 
            font-family: 'Kaisei Tokumin', serif; 
            padding: 10px;
            text-align: center;
        }

        /* --- タイトル最上部（闘龍風） --- */
        h1 { 
            font-family: 'Yuji Syuku', serif;
            font-size: clamp(2.2rem, 10vw, 4.8rem);
            color: #fff;
            margin: 30px 0 20px 0;
            line-height: 1.2;
            text-shadow: 3px 3px 0 #e60000, -1px -1px 0 #e60000, 1px -1px 0 #e60000, -1px 1px 0 #e60000, 1px 1px 0 #e60000;
            letter-spacing: 2px;
        }

        /* --- メニュー --- */
        .header-nav {
            max-width: 950px;
            margin: 0 auto 40px auto;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .nav-item {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            text-decoration: none;
            border: 1px solid #444;
            padding: 12px 5px;
            font-size: 0.85rem;
            font-weight: 800;
            transition: 0.3s;
        }

        .nav-item:hover { background-color: #e60000; border-color: #e60000; }
        .nav-item:nth-child(1), .nav-item:nth-child(2), .nav-item:nth-child(3) { grid-column: span 2; }
        .nav-item:nth-child(4), .nav-item:nth-child(5) { grid-column: span 3; }

        /* --- 各セクション --- */
        .section-container {
            max-width: 950px;
            margin: 0 auto 40px auto;
            text-align: left;
            padding: 0 10px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #f1c40f;
            border-left: 5px solid #e60000;
            padding-left: 15px;
            margin-bottom: 20px;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.5); /* 文字の視認性確保 */
        }
