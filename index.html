<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徳之島闘牛サイト</title>

<link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:10px;
  background:#050505;
  color:#eee;
  font-family:'Kaisei Tokumin', serif;
  text-align:center;
  position:relative;
  min-height:100vh;
}

.bg-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url('IMG_8395.jpg');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0.18;
  filter:grayscale(100%);
  z-index:-1;
}

h1{
  font-family:'Yuji Syuku', serif;
  font-size:clamp(2.6rem,8vw,4.8rem);
  color:#fff;
  margin:35px 0 20px;
  text-shadow:3px 3px 0 #e60000,-1px -1px 0 #e60000,1px -1px 0 #e60000,-1px 1px 0 #e60000,1px 1px 0 #e60000;
  letter-spacing:2px;
}

.menu{
  max-width:950px;
  margin:0 auto 40px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.menu a{
  display:block;
  padding:15px 10px;
  background:rgba(20,20,20,0.8);
  border:1px solid #333;
  text-decoration:none;
  color:#fff;
  font-weight:800;
  transition:all .25s ease;
}

.menu a:hover{
  background:#e60000;
  border-color:#e60000;
  transform:translateY(-2px);
}

.section{
  max-width:950px;
  margin:40px auto;
  text-align:left;
}

.section-title{
  font-size:1.2rem;
  color:#f1c40f;
  border-left:5px solid #e60000;
  padding-left:14px;
  margin-bottom:15px;
  font-weight:800;
}

.box{
  background:rgba(20,20,20,0.78);
  border:1px solid #222;
  padding:24px;
  backdrop-filter:blur(4px);
}

.latest{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.latest a{
  display:block;
  padding:18px 12px;
  background:#111;
  border:1px solid #333;
  text-decoration:none;
  color:#fff;
  font-weight:700;
  line-height:1.8;
  text-align:center;
  transition:all .25s ease;
}

.latest a:hover{
  background:#e60000;
  border-color:#e60000;
}

.arena-list{
  line-height:2;
  color:#ddd;
}

.map-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.map-card{
  background:#111;
  border:1px solid #333;
  padding:14px;
}

.map-card h3{
  margin:0 0 10px;
  font-size:1rem;
  color:#fff;
}

.map-frame{
  width:100%;
  height:260px;
  border:0;
}

.map-note{
  margin-top:10px;
  color:#aaa;
  font-size:0.88rem;
  line-height:1.7;
}

.small-note{
  color:#999;
  font-size:0.9rem;
  text-align:center;
}

footer{
  margin-top:60px;
  color:#666;
  font-size:0.8rem;
}

@media (max-width:700px){
  .menu{
    grid-template-columns:1fr;
  }

  .latest{
    grid-template-columns:1fr;
  }

  .map-grid{
    grid-template-columns:1fr;
  }

  h1{
    font-size:2.5rem;
  }
}
</style>
</head>

<body>

<div class="bg-overlay"></div>

<h1>徳之島闘牛サイト</h1>

<div class="menu">
  <a href="programitiran.html">対戦表</a>
  <a href="search.html">戦歴検索</a>
  <a href="prediction.html">予想</a>
</div>

<div class="section">
  <div class="section-title">最新情報</div>
  <div class="box">
    <div class="latest" id="latestTournament">
      <div class="small-note">読み込み中...</div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">闘牛場</div>
  <div class="box arena-list">
    なくさみ館<br>
    松原闘牛場
  </div>
</div>

<div class="section">
  <div class="section-title">Googleマップ</div>
  <div class="box">
    <div class="map-grid">
      <div class="map-card">
        <h3>なくさみ館</h3>
        <iframe
          class="map-frame"
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=%E5%BE%B3%E4%B9%8B%E5%B3%B6%20%E3%81%AA%E3%81%8F%E3%81%95%E3%81%BF%E9%A4%A8&output=embed">
        </iframe>
      </div>

      <div class="map-card">
        <h3>松原闘牛場</h3>
        <iframe
          class="map-frame"
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=%E5%BE%B3%E4%B9%8B%E5%B3%B6%20%E6%9D%BE%E5%8E%9F%E9%97%98%E7%89%9B%E5%A0%B4&output=embed">
        </iframe>
      </div>
    </div>

    <div class="map-note">
      ※ 地図がうまく出ない場合は、あとでGoogleマップの共有URLに差し替え可能です。
    </div>
  </div>
</div>

<footer>
  © 2026 togyu.net
</footer>

<script>
fetch("data/programs.json")
.then(res => res.json())
.then(data => {
  if(!data || data.length === 0){
    document.getElementById("latestTournament").innerHTML = `
      <div class="small-note">大会データがまだありません。</div>
    `;
    return;
  }

  const latest = data[0];
  const title = latest.title || latest.date || "最新情報";

  const html = `
    <a href="program.html?id=${latest.id}">
      ${title}
    </a>

    <a href="result.html?id=${latest.id}">
      ${title}（結果）
    </a>
  `;

  document.getElementById("latestTournament").innerHTML = html;
})
.catch(() => {
  document.getElementById("latestTournament").innerHTML = `
    <div class="small-note">大会データの読み込みに失敗しました。</div>
  `;
});
</script>

</body>
</html>
