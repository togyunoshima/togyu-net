<style>

/* --- 基本設定 --- */

body{
margin:0;
padding:10px;
background:#050505;
color:#eee;
font-family:'Kaisei Tokumin', serif;
text-align:center;
min-height:100vh;
}

/* 背景画像 */

.bg-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url('IMG_8395.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
opacity:0.15;
filter:grayscale(100%);
z-index:-1;
}

/* タイトル */

h1{
font-family:'Yuji Syuku', serif;
font-size:clamp(2.2rem,10vw,4.8rem);
color:#fff;
margin:30px 0 10px 0;
letter-spacing:2px;
text-shadow:3px 3px 0 #e60000,-1px -1px 0 #e60000,1px -1px 0 #e60000,-1px 1px 0 #e60000,1px 1px 0 #e60000;
position:relative;
}

h1::after{
content:"";
display:block;
width:120px;
height:3px;
background:#e60000;
margin:10px auto 0;
}

/* ナビ */

.header-nav{
max-width:950px;
margin:0 auto 40px auto;
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
}

.nav-item{
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.08);
color:#fff;
text-decoration:none;
border:1px solid #333;
padding:14px 5px;
font-size:0.9rem;
font-weight:800;
transition:all .25s ease;
}

.nav-item:hover{
background:#e60000;
border-color:#e60000;
transform:translateY(-3px);
box-shadow:0 6px 18px rgba(230,0,0,0.35);
}

.nav-item:nth-child(1),
.nav-item:nth-child(2),
.nav-item:nth-child(3){
grid-column:span 2;
}

.nav-item:nth-child(4),
.nav-item:nth-child(5){
grid-column:span 3;
}

/* セクション */

.section-container{
max-width:950px;
margin:0 auto 40px auto;
text-align:left;
}

.section-title{
font-size:1.2rem;
color:#f1c40f;
border-left:5px solid #e60000;
padding-left:15px;
margin-bottom:15px;
font-weight:800;
}

/* コンテンツ */

.content-box{
background:rgba(20,20,20,0.75);
border:1px solid #222;
padding:30px 20px;
color:#aaa;
text-align:center;
backdrop-filter:blur(4px);
}

/* NEXT FIGHT */

.fight-card{
font-size:1.2rem;
font-weight:800;
letter-spacing:1px;
}

.vs{
color:#e60000;
margin:0 10px;
}

/* フッター */

.footer{
margin-top:60px;
color:#555;
font-size:0.75rem;
}

/* スマホ */

@media (max-width:600px){

h1{
font-size:2.3rem;
}

.nav-item{
font-size:0.75rem;
}

}
