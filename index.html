<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徳之島闘牛サイト</title>

<link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:10px;
background:#050505;
color:#eee;
font-family:'Kaisei Tokumin', serif;
text-align:center;
}

h1{
font-family:'Yuji Syuku', serif;
font-size:clamp(2.5rem,8vw,4rem);
color:#fff;
margin:40px 0 20px;
text-shadow:3px 3px 0 #e60000;
}

.menu{
max-width:900px;
margin:0 auto 40px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.menu a{
display:block;
padding:15px;
background:#111;
border:1px solid #333;
text-decoration:none;
color:#fff;
font-weight:700;
}

.menu a:hover{
background:#e60000;
}

.section{
max-width:900px;
margin:40px auto;
text-align:left;
}

.section-title{
font-size:1.3rem;
border-left:5px solid #e60000;
padding-left:10px;
margin-bottom:15px;
font-weight:800;
}

.box{
background:#111;
border:1px solid #333;
padding:25px;
text-align:center;
}

.latest{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.latest a{
display:block;
padding:15px;
background:#111;
border:1px solid #333;
text-decoration:none;
color:#fff;
font-weight:700;
}

.latest a:hover{
background:#e60000;
}

.arena-list{
line-height:2;
}

footer{
margin-top:60px;
color:#666;
font-size:0.8rem;
}

</style>
</head>

<body>

<h1>徳之島闘牛サイト</h1>

<div class="menu">

<a href="programitiran.html">
対戦表
</a>

<a href="search.html">
戦歴検索
</a>

<a href="prediction.html">
予想
</a>

</div>

<div class="section">

<div class="section-title">
最新大会
</div>

<div class="box latest" id="latestTournament">

読み込み中...

</div>

</div>

<div class="section">

<div class="section-title">
闘牛場
</div>

<div class="box arena-list">

徳之島なくさみ館<br>
松原闘牛場<br><br>

石川多目的ドーム<br>
安慶名闘牛場<br>
今帰仁村営闘牛場<br>
本部多目的広場闘牛場

</div>

</div>

<footer>

© 2026 togyu.net

</footer>

<script>

fetch("data/programs.json")
.then(res=>res.json())
.then(data=>{

const latest=data[data.length-1]

const html=`

<a href="program.html?id=${latest.id}">
${latest.title || latest.date}（対戦表）
</a>

<a href="result.html?id=${latest.id}">
${latest.title || latest.date}（結果）
</a>

`

document.getElementById("latestTournament").innerHTML=html

})

</script>

</body>
</html>
