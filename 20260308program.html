<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取組表テンプレート | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 10px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; line-height: 1.5;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        /* --- 大会名・ヘッダー（現状を維持） --- */
        .taikai-header { margin: 20px 0; padding: 0 10px; }
        .taikai-date { font-family: 'Oswald', sans-serif; color: #f1c40f; font-size: 1.2rem; }
        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: clamp(1.4rem, 5vw, 2.2rem); 
            color: #fff; margin: 10px 0; line-height: 1.3;
            text-shadow: 2px 2px 0 #e60000;
            word-wrap: break-word;
        }
        .back-link { display: inline-block; margin-bottom: 20px; color: #aaa; text-decoration: none; font-size: 0.8rem; border: 1px solid #444; padding: 5px 15px; }

        /* --- 大会詳細情報（現状を維持） --- */
        .taikai-info {
            max-width: 950px; margin: 0 auto 20px auto; background: rgba(255,255,255,0.05);
            border: 1px solid #333; padding: 15px; font-size: 0.85rem; text-align: left;
        }
        .info-row { display: flex; margin-bottom: 5px; border-bottom: 1px dotted #444; padding-bottom: 3px; }
        .info-label { width: 80px; color: #f1c40f; font-weight: bold; }

        /* --- 取組表（以前のテーブル形式を導入・調整） --- */
        .match-table-container {
            max-width: 950px; margin: 0 auto; overflow-x: auto; /* スマホで横スクロール可能に */
            border: 1px solid #444; background: rgba(0, 0, 0, 0.7);
        }
        .match-table {
            width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 600px; /* 横幅を確保 */
        }
        .match-table th, .match-table td {
            border: 1px solid #333; padding: 12px 5px; vertical-align: middle;
        }

        /* ヘッダーの色設定（以前のサイト風） */
        .match-table th { background-color: #222; font-size: 0.8rem; color: #aaa; }
        .match-table th.col-east { background-color: #e60000; color: #fff; } /* 東は赤 */
        .match-table th.col-bantuke { background-color: #fff; color: #000; } /* 番付は白 */

        /* 列の幅調整 */
        .col-win { width: 40px; }
        .col-area { width: 60px; font-size: 0.75rem; color: #aaa; }
        .col-vs { width: 100px; font-weight: bold; font-size: 1.1rem; }
        .col-time { width: 80px; font-size: 0.8rem; color: #f1c40f; font-family: 'Oswald', sans-serif; }

        /* 牛情報 */
        .cow-info { font-weight: 800; font-size: 1.1rem; color: #fff; }
        .owner-info { font-weight: normal; font-size: 0.7rem; color: #aaa; display: block; margin-top: 3px; }

        /* 結果マーク */
        .win-mark { color: #e60000; font-size: 1.4rem; font-weight: bold; } /* 白星 */
        .lose-mark { color: #333; font-size: 1.4rem; font-weight: bold; } /* 黒星（薄く） */

        @media (max-width: 600px) {
            .match-table { font-size: 0.9rem; }
            .cow-info { font-size: 1rem; }
            .info-row { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="taikai-header">
    <div class="taikai-date">2026.03.08 SUN</div>
    <h1>玉城千春(Kiroro)スペシャルライブ＆<br>平成19・20年生卒業記念ナイター闘牛大会</h1>
    <a href="programitiran.html" class="back-link">← 対戦表一覧に戻る</a>
</div>

<div class="taikai-info">
    <div class="info-row"><span class="info-label">日時</span><span>令和8年3月8日 午後6時対戦開始</span></div>
    <div class="info-row"><span class="info-label">場所</span><span>伊仙町・なくさみ館</span></div>
    <div class="info-row"><span class="info-label">主催</span><span>徳之島闘牛連合会</span></div>
    <div class="info-row"><span class="info-label">入場料</span><span>大人3,000円 / 小中学生1,000円</span></div>
</div>

<div class="match-table-container">
    <table class="match-table">
        <thead>
            <tr>
                <th class="col-win">勝敗</th>
                <th class="col-area">地区</th>
                <th class="col-east">東方</th>
                <th class="col-bantuke">番付</th>
                <th>西方</th>
                <th class="col-area">地区</th>
                <th class="col-win">勝敗</th>
                <th class="col-time">対戦タイム</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><span class="win-mark">○</span></td>
                <td>面縄</td>
                <td>
                    <span class="cow-info">牛の名前A</span>
                    <span class="owner-info">（牛主：徳之島 太郎）</span>
                </td>
                <td class="col-vs">結び一番</td>
                <td>
                    <span class="cow-info">牛の名前B</span>
                    <span class="owner-info">（牛主：伊仙 次郎）</span>
                </td>
                <td>平土野</td>
                <td><span class="lose-mark">●</span></td>
                <td>12:05</td>
            </tr>

            <tr>
                <td></td>
                <td>浅間</td>
                <td>
                    <span class="cow-info">牛の名前C</span>
                    <span class="owner-info">（牛主：○○○○）</span>
                </td>
                <td class="col-vs">特別指名</td>
                <td>
                    <span class="cow-info">牛の名前D</span>
                    <span class="owner-info">（牛主：△△△△）</span>
                </td>
                <td>真瀬名</td>
                <td></td>
                <td>-- : --</td>
            </tr>
            </tbody>
    </table>
</div>

<p style="color:#555; font-size:0.75rem; margin: 40px 0;">© 2026 togyu.net</p>

</body>
</html>
