<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取組表 | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 10px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; line-height: 1.5;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        /* 大会名・ヘッダー */
        .taikai-header { margin: 20px 0; padding: 0 10px; }
        .taikai-date { font-family: 'Oswald', sans-serif; color: #f1c40f; font-size: 1.2rem; }
        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: clamp(1.4rem, 5vw, 2.2rem); 
            color: #fff; margin: 10px 0; line-height: 1.3;
            text-shadow: 2px 2px 0 #e60000;
            word-wrap: break-word; /* 変な改行を防ぐ */
        }

        /* 大会詳細情報 */
        .taikai-info {
            max-width: 700px; margin: 0 auto 20px auto; background: rgba(255,255,255,0.05);
            border: 1px solid #333; padding: 15px; font-size: 0.85rem; text-align: left;
        }
        .info-row { display: flex; margin-bottom: 5px; border-bottom: 1px dotted #444; padding-bottom: 3px; }
        .info-label { width: 80px; color: #f1c40f; font-weight: bold; }

        .back-link { display: inline-block; margin-bottom: 30px; color: #aaa; text-decoration: none; font-size: 0.8rem; border: 1px solid #444; padding: 5px 15px; }

        /* 取組カード */
        .match-container { max-width: 700px; margin: 0 auto; }
        .match-card {
            background: rgba(15, 15, 15, 0.9); border: 1px solid #444; margin-bottom: 15px; position: relative;
        }
        .match-label {
            position: absolute; top: 0; left: 0; background: #e60000; color: #fff;
            font-size: 0.65rem; padding: 2px 10px; font-weight: bold; z-index: 1;
        }

        /* 対戦エリア */
        .match-main { display: flex; align-items: center; padding: 30px 0 15px 0; }
        .side { width: 42%; padding: 0 5px; }
        .side.east { text-align: right; }
        .side.west { text-align: left; }
        
        .cow-name { font-size: 1.2rem; font-weight: 800; color: #fff; display: block; }
        .owner { font-size: 0.7rem; color: #aaa; }
        .win-mark { color: #e60000; font-size: 1.4rem; font-weight: bold; margin: 0 5px; } /* 勝利の赤丸 */

        .vs-zone { width: 16%; font-family: 'Yuji Syuku', serif; color: #e60000; font-size: 1.2rem; }

        /* フッター情報（地区・タイム） */
        .match-footer {
            display: flex; justify-content: space-between; background: rgba(255,255,255,0.05);
            padding: 5px 15px; border-top: 1px solid #333; font-size: 0.75rem; color: #f1c40f;
        }

        @media (max-width: 600px) {
            .cow-name { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="taikai-header">
    <div class="taikai-date">2026.03.08 SUN</div>
    <h1>玉城千春(Kiroro)スペシャルライブ＆<br>平成19・20年生卒業記念ナイター闘牛大会</h1>
    <a href="programitiran.html" class="back-link">← 対戦表一覧に戻る</a>
</div>

<div class="taikai-info">
    <div class="info-row"><span class="info-label">日時</span><span>令和8年3月8日 午後6時対戦開始</span></div>
    <div class="info-row"><span class="info-label">場所</span><span>伊仙町・なくさみ館</span></div>
    <div class="info-row"><span class="info-label">主催</span><span>徳之島闘牛連合会</span></div>
    <div class="info-row"><span class="info-label">入場料</span><span>大人3,000円 / 小中学生1,000円</span></div>
</div>

<div class="match-container">

    <div class="match-card">
        <div class="match-label">結びの一番</div>
        <div class="match-main">
            <div class="side east">
                <span class="owner">牛主：徳之島 太郎</span>
                <span class="cow-name"><span class="win-mark">○</span>牛の名前A</span>
            </div>
            <div class="vs-zone">VS</div>
            <div class="side west">
                <span class="owner">牛主：伊仙 次郎</span>
                <span class="cow-name">牛の名前B</span>
            </div>
        </div>
        <div class="match-footer">
            <span>地区：伊仙町</span>
            <span style="color:#fff; font-weight:bold;">対戦タイム：12分05秒</span>
            <span>地区：天城町</span>
        </div>
    </div>

    <div class="match-card">
        <div class="match-label">特別指名</div>
        <div class="match-main">
            <div class="side east">
                <span class="owner">牛主：〇〇〇〇</span>
                <span class="cow-name">牛の名前C</span>
            </div>
            <div class="vs-zone">VS</div>
            <div class="side west">
                <span class="owner">牛主：△△△△</span>
                <span class="cow-name">牛の名前D</span>
            </div>
        </div>
        <div class="match-footer">
            <span>地区：徳之島町</span>
            <span>対戦タイム： -- 分 -- 秒</span>
            <span>地区：伊仙町</span>
        </div>
    </div>

</div>

<p style="color:#555; font-size:0.75rem; margin: 40px 0;">© 2026 togyu.net</p>

</body>
</html>
