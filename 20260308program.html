<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>取組表 | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 2px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; line-height: 1.1;
            overflow-x: hidden;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        /* ヘッダーを少しコンパクトに */
        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: 1rem; 
            color: #fff; margin: 5px auto; text-shadow: 1px 1px 0 #e60000;
        }

        .match-table-container { width: 100%; margin: 0 auto; background: rgba(0, 0, 0, 0.9); }
        .match-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #666; }
        
        .col-cow { width: 41%; position: relative; }
        .col-center { width: 18%; }

        /* セルの上下余白を詰めつつ、左右に少しだけゆとり */
        .match-table td { border: 1px solid #444; padding: 5px 1px; vertical-align: middle; }

        /* チャンピオンバッジを少し小さく */
        .badge {
            position: absolute; top: 1px; font-size: 0.45rem; font-weight: 800;
            padding: 0 3px; border-radius: 1px; color: #fff;
        }
        .badge-champ { left: 1px; background: #e60000; }
        .badge-challenger { right: 1px; background: #007bff; }

        /* 牛名：1画面に収めるため少しサイズ調整 */
        .cow-name { 
            font-size: 0.95rem; font-weight: 900; color: #fff; 
            display: block; white-space: nowrap; letter-spacing: -0.5px;
        }

        /* 牛情報：さらにコンパクトに */
        .cow-details { 
            font-size: 0.52rem; color: #aaa; display: block; margin-top: 1px; transform: scale(0.95);
        }
        .detail-item::after { content: "/"; margin: 0 1px; }
        .detail-item:last-child::after { content: ""; }

        /* 中央エリア：高さを抑える */
        .center-box { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bantuke-text { 
            font-size: 0.5rem; color: #f1c40f; font-weight: bold; 
            margin-bottom: 2px; line-height: 1; 
        }
        
        .bantuke-row { display: flex; align-items: center; justify-content: center; height: 22px; }
        .win-mark { width: 18px; font-size: 1rem; font-weight: bold; color: #e60000; }
        .win-mark.none { color: transparent; }

        .bantuke-num {
            font-size: 1.1rem; font-weight: bold; color: #fff; font-family: 'Oswald', sans-serif;
            margin: 0 2px;
        }

        /* タイム：線を細く、余白も最小限 */
        .match-time {
            font-family: 'Oswald', sans-serif; font-size: 0.6rem; color: #fff;
            border-top: 1px solid #333; width: 85%; margin-top: 2px; padding-top: 2px;
        }

        .table-head th { background: #222; font-size: 0.55rem; color: #aaa; padding: 3px 0; }
        .head-east { background: #e60000 !important; color: #fff; }
        .head-west { background: #eee !important; color: #000; }

        @media (min-width: 600px) {
            .match-table-container { max-width: 700px; }
            .cow-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<h1> Kiroroスペシャルライブ ＆ 卒業記念闘牛 </h1>

<div class="match-table-container">
    <table class="match-table">
        <tr class="table-head">
            <th class="head-east">東（紅）</th>
            <th>番付/勝敗/タイム</th>
            <th class="head-west">西（白）</th>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="badge badge-champ">CHAMP</span>
                <span class="cow-name">黒龍王</span>
                <div class="cow-details">
                    <span class="detail-item">面縄</span><span class="detail-item">王座</span><span class="detail-item">永島照己</span>
                </div>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <span class="bantuke-text">全島一争奪戦</span>
                    <div class="bantuke-row">
                        <span class="win-mark">○</span><span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">12:05</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="badge badge-challenger">CHALLENGE</span>
                <span class="cow-name">闘勢琥珀</span>
                <div class="cow-details">
                    <span class="detail-item">平土野</span><span class="detail-item">9連勝</span><span class="detail-item">輝G</span>
                </div>
            </td>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="cow-name">友花形光ちゃん号</span>
                <div class="cow-details">
                    <span class="detail-item">石垣</span><span class="detail-item">デビュー</span><span class="detail-item">玉代勢</span>
                </div>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <span class="bantuke-text">ミニ軽量級</span>
                    <div class="bantuke-row">
                        <span class="win-mark none">○</span><span class="bantuke-num">2</span><span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">--:--</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="cow-name">友良牛</span>
                <div class="cow-details">
                    <span class="detail-item">古里</span><span class="detail-item">2連勝</span><span class="detail-item">友良賢士</span>
                </div>
            </td>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="cow-name">闘～Touki～氣</span>
                <div class="cow-details"><span class="detail-item">浅間</span><span class="detail-item">4勝</span><span class="detail-item">握正之</span></div>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <div class="bantuke-row">
                        <span class="win-mark none">○</span><span class="bantuke-num">3</span><span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">--:--</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="cow-name">真瀬名ヒーラー</span>
                <div class="cow-details"><span class="detail-item">真瀬名</span><span class="detail-item">牛主:真瀬名</span></div>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
