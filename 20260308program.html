<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取組表 | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 5px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; line-height: 1.2;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        /* --- 大会名・ヘッダー --- */
        .taikai-header { margin: 10px 0; }
        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: clamp(1.2rem, 4.2vw, 1.8rem); 
            color: #fff; margin: 5px auto; line-height: 1.4; max-width: 95%;
            word-break: keep-all; overflow-wrap: break-word; text-shadow: 1px 1px 0 #e60000;
        }
        .back-link { display: inline-block; margin-bottom: 8px; color: #aaa; text-decoration: none; font-size: 0.7rem; border: 1px solid #444; padding: 2px 10px; }

        /* --- 大会詳細情報（復活） --- */
        .taikai-info {
            max-width: 100%; margin: 0 auto 10px auto; background: rgba(255,255,255,0.05);
            border: 1px solid #333; padding: 10px; font-size: 0.75rem; text-align: left;
        }
        .info-row { display: flex; margin-bottom: 3px; border-bottom: 1px dotted #444; padding-bottom: 2px; }
        .info-label { width: 60px; color: #f1c40f; font-weight: bold; }

        /* --- 取組表（スワイプなし・全項目表示） --- */
        .match-table-container { width: 100%; margin: 0 auto; background: rgba(0, 0, 0, 0.85); }
        .match-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .match-table th, .match-table td {
            border: 1px solid #444; padding: 6px 0px; vertical-align: middle;
        }

        /* 列幅調整 */
        .col-win { width: 6%; }      /* 勝敗 */
        .col-area { width: 8%; }     /* 地区 */
        .col-cow { width: 32%; }     /* 牛名・牛主 */
        .col-bantuke { width: 10%; } /* 番付 */
        .col-time { width: 8%; }     /* 対戦タイム */

        .match-table th { background-color: #222; color: #aaa; font-size: 0.55rem; height: 22px; }
        .match-table th.col-east { background-color: #e60000; color: #fff; }
        .match-table th.col-white { background-color: #fff; color: #000; }

        /* 牛名：最大化 / 牛主：1行維持 */
        .cow-name { font-size: 1.15rem; font-weight: 900; color: #fff; display: block; margin-bottom: 1px; }
        .owner-name { font-size: 0.55rem; color: #ccc; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 地区：中央揃え */
        .area-text { 
            font-size: 0.65rem; color: #eee; 
            writing-mode: vertical-rl; text-orientation: upright;
            display: inline-block; vertical-align: middle; letter-spacing: 1px;
        }

        /* 番付：隙間なし・文字サイズで埋める */
        .bantuke-text { font-weight: bold; color: #f1c40f; line-height: 1.0; }
        .b-main { font-size: 0.8rem; display: block; margin-bottom: 2px; }
        .b-sub { font-size: 0.55rem; display: block; color: #eee; letter-spacing: -0.5px; }

        .win-mark { color: #e60000; font-size: 1rem; font-weight: bold; }
        .time-text { font-family: 'Oswald', sans-serif; font-size: 0.65rem; color: #fff; }

        @media (min-width: 600px) {
            .match-table-container { max-width: 950px; }
            .cow-name { font-size: 1.5rem; }
            .b-main { font-size: 1.1rem; }
            .b-sub { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="taikai-header">
    <h1>玉城千春(Kiroro)スペシャルライブ＆<br>平成19・20年生卒業記念ナイター闘牛大会</h1>
    <a href="programitiran.html" class="back-link">← 一覧に戻る</a>
</div>

        <tbody>

</div>

</body>
</html>
