<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>取組表 | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 5px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; line-height: 1.3;
            overflow-x: hidden;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.12; filter: grayscale(100%); z-index: -1;
        }

        /* ヘッダー周り：コンパクト化 */
        .taikai-header { margin: 10px 0; }
        .taikai-date { font-family: 'Oswald', sans-serif; color: #f1c40f; font-size: 1rem; }
        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: 1.3rem; 
            color: #fff; margin: 5px 0; line-height: 1.2;
            text-shadow: 1px 1px 0 #e60000;
        }
        .back-link { display: inline-block; margin-bottom: 10px; color: #aaa; text-decoration: none; font-size: 0.7rem; border: 1px solid #444; padding: 2px 10px; }

        /* 大会情報：1行に凝縮 */
        .taikai-info {
            max-width: 600px; margin: 0 auto 10px auto; background: rgba(255,255,255,0.03);
            border: 1px solid #333; padding: 8px; font-size: 0.65rem; text-align: left;
            display: grid; grid-template-columns: 1fr 1fr; gap: 2px 10px;
        }
        .info-row { border-bottom: 1px dotted #444; padding: 1px 0; display: flex; }
        .info-label { width: 45px; color: #f1c40f; flex-shrink: 0; }

        /* 取組リスト：隙間ゼロ構成 */
        .match-container { 
            max-width: 600px; margin: 0 auto; 
            border: 1px solid #444; /* 全体を囲う枠線 */
            background: rgba(15, 15, 15, 0.95);
        }
        .match-item {
            position: relative;
            border-bottom: 1px solid #444; /* 各組の区切り線 */
            padding-bottom: 0;
        }
        .match-item:last-child { border-bottom: none; }

        /* 番付ラベル */
        .match-label {
            position: absolute; top: 0; left: 0; background: #e60000; color: #fff;
            font-size: 0.55rem; padding: 1px 6px; font-weight: bold; z-index: 1;
        }
        .match-label.special { background: #fff; color: #000; }
        .match-label.num { background: #333; color: #aaa; }

        /* 対戦エリア：高さを抑える */
        .match-main { display: flex; align-items: center; padding: 18px 4px 6px 4px; }
        .side { width: 42%; }
        .side.east { text-align: right; padding-right: 4px; }
        .side.west { text-align: left; padding-left: 4px; }
        
        .cow-name { 
            font-size: 0.95rem; font-weight: 800; color: #fff; 
            display: block; white-space: nowrap; letter-spacing: -0.5px;
        }
        .owner { 
            font-size: 0.5rem; color: #aaa; display: block; 
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        .win-mark { color: #e60000; font-size: 0.9rem; margin: 0 1px; vertical-align: middle; }

        .vs-zone { 
            width: 16%; font-family: 'Yuji Syuku', serif; color: #e60000; 
            font-size: 0.9rem; font-weight: bold; flex-shrink: 0;
        }

        /* フッター：より細く */
        .match-footer {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 2px 8px; border-top: 1px solid #222; font-size: 0.6rem; color: #f1c40f;
        }
        .time-box { color: #fff; font-family: 'Oswald', sans-serif; font-size: 0.65rem; }

        @media (min-width: 600px) {
            .cow-name { font-size: 1.4rem; }
            .taikai-info { font-size: 0.8rem; }
        }
    </style>
</head>
