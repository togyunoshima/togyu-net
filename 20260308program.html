<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>取組表 | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 5px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; overflow-x: hidden;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: clamp(1rem, 4.2vw, 1.7rem); 
            color: #fff; margin: 10px auto; text-shadow: 2px 2px 0 #e60000;
        }

        /* 取組表スタイル：沖縄プログラム参照 */
        .match-table-container { width: 100%; margin: 0 auto; background: rgba(0, 0, 0, 0.9); }
        .match-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1.5px solid #666; }
        
        /* 列幅：牛名を最大化（各40%）、中央（番付・勝敗・タイム）を凝縮 */
        .col-cow { width: 40%; }
        .col-center { width: 20%; } /* ここに番付・◯・タイムをまとめる */

        .match-table td {
            border: 1px solid #444; padding: 6px 2px; vertical-align: middle;
        }

        /* 牛名：横幅いっぱい使って1行 */
        .cow-name { 
            font-size: clamp(0.8rem, 3.5vw, 1.4rem); 
            font-weight: 900; color: #fff; display: block; 
            white-space: nowrap; letter-spacing: -0.5px;
        }
        /* 牛主：牛名の下に配置 */
        .owner-name { 
            font-size: 0.55rem; color: #bbb; display: block; margin-top: 2px;
        }
        .area-text { font-size: 0.5rem; color: #aaa; display: block; margin-bottom: 2px; }

        /* 中央エリア：番付・勝敗・タイム */
        .center-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .bantuke-row { display: flex; align-items: center; justify-content: center; width: 100%; }
        
        .win-mark { 
            width: 20px; font-size: 1rem; font-weight: bold; color: #e60000;
        }
        .win-mark.none { color: transparent; }

        .bantuke-num {
            font-size: 1.1rem; font-weight: bold; color: #f1c40f; font-family: 'Oswald', sans-serif;
            margin: 0 5px;
        }
        .bantuke-text-small { font-size: 0.5rem; color: #f1c40f; font-weight: bold; line-height: 1; }

        .match-time {
            font-family: 'Oswald', sans-serif; font-size: 0.65rem; color: #fff;
            border-top: 1px solid #444; width: 100%; margin-top: 4px; padding-top: 2px;
        }

        /* ヘッダー */
        .table-head { background: #222; font-size: 0.6rem; color: #aaa; }
        .head-east { background: #e60000; color: #fff; }
        .head-west { background: #eee; color: #000; }

        @media (min-width: 600px) {
            .match-table-container { max-width: 800px; }
            .owner-name { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<h1>玉城千春(Kiroro)スペシャルライブ＆<br>平成19・20年生卒業記念ナイター闘牛大会</h1>

<div class="match-table-container">
    <table class="match-table">
        <tr class="table-head">
            <th class="head-east">東（紅）</th>
            <th>番付 ／ 勝敗 ／ タイム</th>
            <th class="head-west">西（白）</th>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="area-text">面縄</span>
                <span class="cow-name">黒龍王</span>
                <span class="owner-name">牛主：永島照己</span>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <span class="bantuke-text-small">全島一</span>
                    <div class="bantuke-row">
                        <span class="win-mark">○</span>
                        <span class="bantuke-num">1</span>
                        <span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">12' 05</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="area-text">平土野</span>
                <span class="cow-name">闘勢琥珀</span>
                <span class="owner-name">9連勝(輝グループ)</span>
            </td>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="area-text">石垣島</span>
                <span class="cow-name">友花形光ちゃん号</span>
                <span class="owner-name">牛主：玉代勢光子</span>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <span class="bantuke-text-small">ミニ軽量級</span>
                    <div class="bantuke-row">
                        <span class="win-mark none">○</span>
                        <span class="bantuke-num">2</span>
                        <span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">--' --</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="area-text">古里</span>
                <span class="cow-name">友良牛</span>
                <span class="owner-name">2連勝(友良賢士)</span>
            </td>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="area-text">浅間</span>
                <span class="cow-name">闘～Touki～氣</span>
                <span class="owner-name">調教師：握正之</span>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <div class="bantuke-row">
                        <span class="win-mark none">○</span>
                        <span class="bantuke-num">3</span>
                        <span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">--' --</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="area-text">真瀬名</span>
                <span class="cow-name">真瀬名ヒーラー</span>
                <span class="owner-name">牛主：真瀬名</span>
            </td>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="area-text">手々</span>
                <span class="cow-name">はる次郎</span>
                <span class="owner-name">調教師：植木太陽</span>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <div class="bantuke-row">
                        <span class="win-mark none">○</span>
                        <span class="bantuke-num">7</span>
                        <span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">--' --</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="area-text">木之香</span>
                <span class="cow-name">神風パン次郎</span>
                <span class="owner-name">牛主：永岡兄弟</span>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
