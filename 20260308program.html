<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取組表 | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 5px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; line-height: 1.2;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        /* --- ヘッダー --- */
        .taikai-header { margin: 10px 0; }
        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: clamp(1.1rem, 4vw, 1.6rem); 
            color: #fff; margin: 5px auto; line-height: 1.3; max-width: 95%;
            word-break: keep-all; overflow-wrap: break-word; text-shadow: 1px 1px 0 #e60000;
        }
        .back-link { display: inline-block; margin-bottom: 8px; color: #aaa; text-decoration: none; font-size: 0.7rem; border: 1px solid #444; padding: 2px 8px; }

        /* --- 取組表（スワイプ厳禁・文字強調設定） --- */
        .match-table-container { width: 100%; margin: 0 auto; background: rgba(0, 0, 0, 0.85); }
        .match-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .match-table th, .match-table td {
            border: 1px solid #444; padding: 4px 0px; vertical-align: middle;
        }

        /* 列幅の黄金比（牛名を最大化） */
        .col-win { width: 6%; }      /* 勝敗 */
        .col-area { width: 9%; }     /* 地区 */
        .col-cow { width: 31%; }     /* 牛名・牛主（ここを最大に） */
        .col-bantuke { width: 8%; }  /* 番付（極限まで絞る） */
        .col-time { width: 9%; }     /* 対戦タイム */

        .match-table th { background-color: #222; color: #aaa; font-size: 0.5rem; height: 20px; }
        .match-table th.col-east { background-color: #e60000; color: #fff; }
        .match-table th.col-white { background-color: #fff; color: #000; }

        /* 牛名：とにかく太く大きく */
        .cow-name { 
            font-size: 1rem; /* スマホでしっかり見えるサイズ */
            font-weight: 900; color: #fff; display: block; 
            letter-spacing: -0.5px; margin-bottom: 2px;
        }
        /* 牛主：改行せず、小さく1行で */
        .owner-name { 
            font-size: 0.55rem; color: #ccc; display: block; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        .area-text { font-size: 0.6rem; color: #bbb; writing-mode: vertical-rl; padding: 2px !important; } /* 地区も縦書きで幅節約 */

        /* 番付：長い名前を縦書き風に改行して幅を節約 */
        .bantuke-text { 
            font-size: 0.65rem; font-weight: bold; color: #f1c40f; 
            line-height: 1.1; display: block; padding: 0 2px;
            word-break: break-all; 
        }

        .win-mark { color: #e60000; font-size: 0.9rem; font-weight: bold; }
        .time-text { font-family: 'Oswald', sans-serif; font-size: 0.6rem; color: #fff; line-height: 1; }

        @media (min-width: 600px) {
            .match-table-container { max-width: 950px; }
            .cow-name { font-size: 1.3rem; }
            .owner-name { font-size: 0.8rem; }
            .bantuke-text { font-size: 0.9rem; writing-mode: horizontal-tb; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="taikai-header">
    <h1>玉城千春(Kiroro)スペシャルライブ＆<br>平成19・20年生卒業記念ナイター闘牛大会</h1>
    <a href="programitiran.html" class="back-link">← 一覧に戻る</a>
</div>

<div class="match-table-container">
    <table class="match-table">
        <thead>
            <tr>
                <th class="col-win">勝敗</th>
                <th class="col-area">地区</th>
                <th class="col-east">東方</th>
                <th class="col-white">番付</th>
                <th>西方</th>
                <th class="col-area">地区</th>
                <th class="col-win">勝敗</th>
                <th class="col-time">タイム</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><span class="win-mark">○</span></td>
                <td class="area-text">面縄</td>
                <td class="col-cow">
                    <span class="cow-name">黒龍王</span>
                    <span class="owner-name">牛主：永島照己</span>
                </td>
                <td class="bantuke-text">全島一優勝旗争奪戦</td>
                <td class="col-cow">
                    <span class="cow-name">闘勢琥珀</span>
                    <span class="owner-name">牛主：輝グループ</span>
                </td>
                <td class="area-text">平土野</td>
                <td></td>
                <td class="time-text">12:05</td>
            </tr>
            <tr>
                <td></td>
                <td class="area-text">石垣島</td>
                <td class="col-cow">
                    <span class="cow-name">光ちゃん号</span>
                    <span class="owner-name">牛主：玉代勢光子</span>
                </td>
                <td class="bantuke-text">ミニ軽量級優勝旗争奪戦</td>
                <td class="col-cow">
                    <span class="cow-name">友良牛</span>
                    <span class="owner-name">牛主：友良賢士</span>
                </td>
                <td class="area-text">古里</td>
                <td></td>
                <td class="time-text">--:--</td>
            </tr>
        </tbody>
    </table>
</div>

<p style="color:#555; font-size:0.6rem; margin: 20px 0;">© 2026 togyu.net</p>

</body>
</html>
