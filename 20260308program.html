<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>取組表 | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 5px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; line-height: 1.2;
            overflow-x: hidden;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: clamp(1rem, 4.2vw, 1.7rem); 
            color: #fff; margin: 10px auto; text-shadow: 2px 2px 0 #e60000;
        }

        .match-table-container { width: 100%; margin: 0 auto; background: rgba(0, 0, 0, 0.9); }
        .match-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1.5px solid #666; }
        
        /* 列幅：牛名エリアを広めに確保 */
        .col-cow { width: 42%; position: relative; }
        .col-center { width: 16%; } /* 番付のみに絞って凝縮 */

        .match-table td { border: 1px solid #444; padding: 15px 2px 10px 2px; vertical-align: middle; }

        /* 日本語バッジ：斜め配置でポスター風に */
        .badge {
            position: absolute; top: 0; font-size: 0.5rem; font-weight: 800;
            padding: 2px 6px; color: #fff; z-index: 1;
        }
        .badge-champ { left: 0; background: #e60000; border-radius: 0 0 5px 0; }
        .badge-challenger { right: 0; background: #007bff; border-radius: 0 0 0 5px; }

        .cow-name { 
            font-size: clamp(0.95rem, 4vw, 1.6rem); 
            font-weight: 900; color: #fff; display: block; 
            white-space: nowrap; letter-spacing: -0.5px; margin-bottom: 5px;
        }

        /* 地区・戦歴・牛主・元名 */
        .cow-details { 
            font-size: 0.55rem; color: #bbb; display: block; line-height: 1.4;
        }
        .detail-item { display: inline-block; }
        .detail-item::after { content: " / "; color: #555; }
        .detail-item:last-child::after { content: ""; }

        /* 中央エリア：番付メイン */
        .center-box { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .bantuke-text { 
            font-size: 0.65rem; color: #f1c40f; font-weight: bold; 
            line-height: 1.1; margin-bottom: 3px;
        }
        
        .bantuke-num {
            font-size: 1.5rem; font-weight: bold; color: #fff; font-family: 'Oswald', sans-serif;
            line-height: 1;
        }

        /* タイム・結果：番付のすぐ下に配置 */
        .match-result {
            margin-top: 8px; border-top: 1px solid #444; width: 100%; padding-top: 4px;
        }
        .win-circle { font-size: 1rem; color: #e60000; font-weight: bold; display: block; margin-bottom: 2px; }
        .time-val { font-family: 'Oswald', sans-serif; font-size: 0.65rem; color: #aaa; white-space: nowrap; }

        /* ヘッダー */
        .table-head { background: #111; font-size: 0.6rem; color: #888; }
        .head-east { background: #e60000; color: #fff; border-color: #e60000; }
        .head-west { background: #eee; color: #000; border-color: #eee; }

        @media (min-width: 600px) {
            .match-table-container { max-width: 850px; }
            .badge { font-size: 0.75rem; }
            .cow-details { font-size: 0.8rem; }
            .bantuke-num { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<h1>玉城千春(Kiroro)スペシャルライブ＆<br>平成19・20年生卒業記念ナイター闘牛大会</h1>

<div class="match-table-container">
    <table class="match-table">
        <tr class="table-head">
            <th class="head-east">東（紅）</th>
            <th>番付 ／ 結果</th>
            <th class="head-west">西（白）</th>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="badge badge-champ">チャンピオン</span>
                <span class="cow-name">黒龍王</span>
                <div class="cow-details">
                    <span class="detail-item">面縄</span>
                    <span class="detail-item">現王座</span>
                    <span class="detail-item">永島照己</span>
                </div>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <span class="bantuke-text">全島一優勝旗<br>争奪戦</span>
                    <div class="match-result">
                        <span class="win-circle">○</span>
                        <span class="time-val">12:05</span>
                    </div>
                </div>
            </td>
            <td class="col-cow">
                <span class="badge badge-challenger">チャレンジャー</span>
                <span class="cow-name">闘勢琥珀</span>
                <div class="cow-details">
                    <span class="detail-item">平土野</span>
                    <span class="detail-item">9連勝</span>
                    <span class="detail-item">輝グループ</span>
                    <span class="detail-item">元：琥珀</span>
                </div>
            </td>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="cow-name">友花形光ちゃん号</span>
                <div class="cow-details">
                    <span class="detail-item">石垣島</span>
                    <span class="detail-item">徳之島デビュー</span>
                    <span class="detail-item">玉代勢光子</span>
                </div>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <span class="bantuke-num">2</span>
                    <div class="match-result">
                        <span class="win-circle" style="color:transparent;">○</span>
                        <span class="time-val">--:--</span>
                    </div>
                </div>
            </td>
            <td class="col-cow">
                <span class="cow-name">友良牛</span>
                <div class="cow-details">
                    <span class="detail-item">古里</span>
                    <span class="detail-item">2連勝</span>
                    <span class="detail-item">友良賢士</span>
                </div>
            </td>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="cow-name">闘～Touki～氣</span>
                <div class="cow-details">
                    <span class="detail-item">浅間</span>
                    <span class="detail-item">4連勝</span>
                    <span class="detail-item">調教師：握正之</span>
                </div>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <span class="bantuke-num">3</span>
                    <div class="match-result">
                        <span class="win-circle" style="color:transparent;">○</span>
                        <span class="time-val">--:--</span>
                    </div>
                </div>
            </td>
            <td class="col-cow">
                <span class="cow-name">真瀬名ヒーラー</span>
                <div class="cow-details">
                    <span class="detail-item">真瀬名</span>
                    <span class="detail-item">牛主：真瀬名</span>
                </div>
            </td>
        </tr>
    </table>
</div>

<p style="color:#555; font-size:0.6rem; margin: 30px 0;">© 2026 togyu.net</p>

</body>
</html>
