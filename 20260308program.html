<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>取組表 | 徳之島闘牛サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 5px; background-color: #050505; color: #eee; 
            font-family: 'Kaisei Tokumin', serif; text-align: center; line-height: 1.2;
            overflow-x: hidden;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_8395.jpg'); background-size: cover;
            background-position: center; opacity: 0.15; filter: grayscale(100%); z-index: -1;
        }

        h1 { 
            font-family: 'Yuji Syuku', serif; font-size: clamp(1rem, 4.2vw, 1.7rem); 
            color: #fff; margin: 10px auto; text-shadow: 2px 2px 0 #e60000;
        }

        .match-table-container { width: 100%; margin: 0 auto; background: rgba(0, 0, 0, 0.9); }
        .match-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1.5px solid #666; }
        
        /* 列幅：牛名エリア 40%ずつ、中央 20% */
        .col-cow { width: 40%; position: relative; }
        .col-center { width: 20%; }

        .match-table td { border: 1px solid #444; padding: 12px 2px; vertical-align: middle; }

        /* --- チャンピオン・チャレンジャーバッジ --- */
        .badge {
            position: absolute; top: 2px; font-size: 0.5rem; font-weight: 800;
            padding: 1px 4px; border-radius: 2px; color: #fff; text-transform: uppercase;
        }
        .badge-champ { left: 2px; background: #e60000; }   /* 東方の左上（赤） */
        .badge-challenger { right: 2px; background: #007bff; } /* 西方の右上（青） */

        /* 牛名 */
        .cow-name { 
            font-size: clamp(0.9rem, 3.8vw, 1.6rem); 
            font-weight: 900; color: #fff; display: block; 
            white-space: nowrap; letter-spacing: -0.5px; margin-bottom: 4px;
        }

        /* 下にまとめる情報（地区名、戦歴、牛主、元名） */
        .cow-details { 
            font-size: 0.55rem; color: #bbb; display: block; line-height: 1.3;
        }
        .detail-item { margin-right: 3px; }
        .detail-item::after { content: " / "; }
        .detail-item:last-child::after { content: ""; }

        /* 中央エリア */
        .center-box { display: flex; flex-direction: column; align-items: center; }
        .bantuke-text { 
            font-size: 0.6rem; color: #f1c40f; font-weight: bold; 
            margin-bottom: 5px; line-height: 1.1; 
        }
        
        .bantuke-row { display: flex; align-items: center; justify-content: center; width: 100%; }
        .win-mark { width: 22px; font-size: 1.2rem; font-weight: bold; color: #e60000; }
        .win-mark.none { color: transparent; }

        /* 番付がある時は数字を出さない設定 */
        .bantuke-num {
            font-size: 1.3rem; font-weight: bold; color: #fff; font-family: 'Oswald', sans-serif;
            margin: 0 5px;
        }

        .match-time {
            font-family: 'Oswald', sans-serif; font-size: 0.65rem; color: #fff;
            border-top: 1px solid #444; width: 90%; margin-top: 6px; padding-top: 4px;
        }

        /* ヘッダー */
        .table-head { background: #222; font-size: 0.6rem; color: #aaa; }
        .head-east { background: #e60000; color: #fff; }
        .head-west { background: #eee; color: #000; }

        @media (min-width: 600px) {
            .match-table-container { max-width: 850px; }
            .badge { font-size: 0.7rem; padding: 2px 8px; }
            .cow-details { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<h1>玉城千春(Kiroro)スペシャルライブ＆<br>平成19・20年生卒業記念ナイター闘牛大会</h1>

<div class="match-table-container">
    <table class="match-table">
        <tr class="table-head">
            <th class="head-east">東（紅）</th>
            <th>番付 ／ 勝敗 ／ タイム</th>
            <th class="head-west">西（白）</th>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="badge badge-champ">CHAMPION</span>
                <span class="cow-name">黒龍王</span>
                <div class="cow-details">
                    <span class="detail-item">面縄</span>
                    <span class="detail-item">現王座</span>
                    <span class="detail-item">永島照己</span>
                </div>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <span class="bantuke-text">全島一優勝旗<br>争奪戦</span>
                    <div class="bantuke-row">
                        <span class="win-mark">○</span>
                        <span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">12:05</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="badge badge-challenger">CHALLENGER</span>
                <span class="cow-name">闘勢琥珀</span>
                <div class="cow-details">
                    <span class="detail-item">平土野</span>
                    <span class="detail-item">9連勝</span>
                    <span class="detail-item">輝グループ</span>
                    <span class="detail-item">元：琥珀</span>
                </div>
            </td>
        </tr>

        <tr>
            <td class="col-cow">
                <span class="cow-name">友花形光ちゃん号</span>
                <div class="cow-details">
                    <span class="detail-item">石垣島</span>
                    <span class="detail-item">徳之島デビュー</span>
                    <span class="detail-item">玉代勢光子</span>
                </div>
            </td>
            <td class="col-center">
                <div class="center-box">
                    <div class="bantuke-row">
                        <span class="win-mark none">○</span>
                        <span class="bantuke-num">2</span>
                        <span class="win-mark none">○</span>
                    </div>
                    <div class="match-time">--:--</div>
                </div>
            </td>
            <td class="col-cow">
                <span class="cow-name">友良牛</span>
                <div class="cow-details">
                    <span class="detail-item">古里</span>
                    <span class="detail-item">2連勝</span>
                    <span class="detail-item">友良賢士</span>
                </div>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
