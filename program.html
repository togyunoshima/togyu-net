<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対戦表 | 徳之島闘牛サイト</title>
  
<style>
body {
  background: #000;
  color: #fff;
  font-family: sans-serif;
}

h2 {
  text-align: center;
  color: red;
}

/* ===== ヘッダー ===== */
.program-header {
  margin: 20px 0;
  line-height: 1.6;
}

/* ===== テーブル ===== */
.match-table {
  width: 100%;
  border-top: 1px solid #333;
}

.match-row {
  display: grid;
  grid-template-columns: 1fr 120px 1fr;
  border-bottom: 1px solid #333;
}

.east, .west {
  padding: 6px;
}

.east {
  text-align: right;
}

.west {
  text-align: left;
}

.rank {
  text-align: center;
  color: gold;
  font-weight: bold;
}

/* ===== 文字 ===== */
.name {
  font-size: 18px;
  font-weight: bold;
  line-height: 1.1;
}

.record {
  font-size: 13px;
  margin-top: 2px;
}

.owner {
  font-size: 12px;
  opacity: 0.8;
}

.small {
  font-size: 10px !important;
}

/* リンク */
a {
  color: #4da3ff;
  text-decoration: none;
}
</style>
</head>

<body>

<h2>対戦表</h2>

<div id="program-container"></div>

<script>
Promise.all([
  fetch("data/programs.json").then(res => res.json()),
  fetch("data/matches.json").then(res => res.json())
])
.then(([programs, matches]) => {

  const container = document.getElementById("program-container");
  container.innerHTML = "";

  programs.forEach(event => {

    const header = document.createElement("div");
    header.className = "program-header";
    header.innerHTML = `
      <div>日時：${event.date || ""}</div>
      <div>場所：${event.place || ""}</div>
      <div>主催：${event.host || ""}</div>
      <div>入場料：${event.price || ""}</div>
    `;
    container.appendChild(header);

    const table = document.createElement("div");
    table.className = "match-table";

    // 🔥 ここが重要：日付で一致させる
    const eventMatches = matches.filter(m => m.date === event.date);

    eventMatches.forEach(match => {

      const east = match.east || {};
      const west = match.west || {};

      const row = document.createElement("div");
      row.className = "match-row";

      function makeRecord(record) {
        if (!record) return "";
        if (record.includes("勝") || record.includes("連勝")) {
          return `<a href="#">${record}</a>`;
        }
        return record;
      }

      function format(record, owner) {
        const text = (record || "") + (owner || "");

        if (text.length < 20) {
          return `<div class="record">${makeRecord(record)} ${owner}</div>`;
        }

        if (text.length < 35) {
          return `
            <div class="record">${makeRecord(record)}</div>
            <div class="owner">${owner}</div>
          `;
        }

        return `
          <div class="record small">${makeRecord(record)}</div>
          <div class="owner small">${owner}</div>
        `;
      }

      row.innerHTML = `
        <div class="east">
          <div class="name">${east.name || ""}</div>
          ${format(east.record, east.owner)}
        </div>

        <div class="rank">
          ${match.rank || ""}
        </div>

        <div class="west">
          <div class="name">${west.name || ""}</div>
          ${format(west.record, west.owner)}
        </div>
      `;

      table.appendChild(row);
    });

    container.appendChild(table);
  });

});
</script>

</body>
</html>
