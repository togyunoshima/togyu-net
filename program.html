<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対戦表 | 徳之島闘牛サイト</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
  <style>
    :root{
      --area-col: 10%;
      --rank-col: 22%;
      --side-col: 29%;
    }

    body{
      margin:0;
      padding:14px 8px 40px;
      background:#050505;
      color:#eee;
      font-family:'Kaisei Tokumin', serif;
      position:relative;
      min-height:100vh;
    }

    .bg-overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background-image:url('IMG_8395.jpg');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      opacity:0.18;
      filter:grayscale(100%);
      z-index:-1;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    .top-nav{
      max-width:1100px;
      margin:0 auto 18px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }

    .top-nav a{
      display:block;
      text-align:center;
      padding:12px 8px;
      background:#111;
      border:1px solid #333;
      color:#fff;
      text-decoration:none;
      font-weight:800;
      font-size:0.92rem;
    }

    .top-nav a:hover{
      background:#e60000;
    }

    .top-nav a.active{
      background:#1a1a1a;
      border-color:#f1c40f;
      color:#f1c40f;
    }

    h1{
      text-align:center;
      font-family:'Yuji Syuku', serif;
      font-size:clamp(1.5rem, 4.8vw, 3rem);
      color:#fff;
      margin:10px 0 22px;
      text-shadow:
        3px 3px 0 #e60000,
        -1px -1px 0 #e60000,
        1px -1px 0 #e60000,
        -1px 1px 0 #e60000,
        1px 1px 0 #e60000;
      line-height:1.55;
      white-space:normal;
      word-break:keep-all;
      overflow-wrap:anywhere;
      letter-spacing:0.02em;
    }

    .event-meta{
      background:rgba(20,20,20,0.8);
      border:1px solid #222;
      margin-bottom:20px;
    }

    .meta-row{
      display:grid;
      grid-template-columns:92px 1fr;
      border-bottom:1px solid #333;
    }

    .meta-row:last-child{
      border-bottom:none;
    }

    .meta-label{
      background:rgba(20,20,20,0.72);
      backdrop-filter:blur(4px);
      color:#f1c40f;
      font-weight:800;
      padding:12px 12px;
      font-size:0.9rem;
    }

    .meta-value{
      padding:12px 12px;
      color:#fff;
      font-size:0.92rem;
      line-height:1.6;
      white-space:normal;
      word-break:break-word;
    }

    .program-table-wrap{
      background:rgba(20,20,20,0.8);
      border:1px solid #222;
      overflow-x:hidden;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    col.area-col{ width:var(--area-col); }
    col.rank-col{ width:var(--rank-col); }
    col.side-col{ width:var(--side-col); }

    th, td{
      border:1px solid #333;
      text-align:center;
      vertical-align:middle;
      padding:0;
    }

    th{
      background:rgba(20,20,20,0.72);
      backdrop-filter:blur(4px);
      color:#fff;
      font-weight:800;
      padding:12px 6px;
      font-size:0.92rem;
    }

    th.east-head{ background:#b60000; }
    th.west-head{ background:#d9d9d9; color:#222; }
    th.rank-head{ background:#222; color:#f1c40f; }
    th.area-head{ background:#222; color:#fff; }

    td.area{
      background:#0a0a0a;
      color:#fff;
      font-weight:700;
      font-size:0.88rem;
      padding:12px 4px;
      line-height:1.15;
      white-space:nowrap;
      word-break:keep-all;
    }

    td.east, td.west{
      background:#050505;
      padding:7px 4px 4px;
      position:relative;
    }

    td.rank{
      background:#0f0f0f;
      padding:8px 1px;
    }

    .champion-tag,
    .challenger-tag{
      position:absolute;
      top:5px;
      font-weight:800;
      line-height:1;
      letter-spacing:0.02em;
      z-index:2;
    }

    .champion-tag{
      left:6px;
      color:#e60000;
      font-size:0.58rem;
    }

    .challenger-tag{
      right:6px;
      color:#4da3ff;
      font-size:0.58rem;
    }

    .subtext{
      color:#f1c40f;
      font-size:0.78rem;
      line-height:1.05;
      margin-bottom:1px;
      font-weight:700;
      white-space:normal;
      overflow:visible;
      text-overflow:unset;
      word-break:break-word;
    }
    .subtext:empty{
      display:none;
    }

    .bull-name{
      color:#fff;
      margin:0px;
      line-height:1.01;
      min-height:2.5em;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .bull-top{
      font-size:0.95rem;
      line-height:1.02;
      font-weight:700;
    }

    .bull-middle{
      font-size:0.86rem;
      line-height:1.02;
      font-weight:700;
    }

    .bull-main{
      font-size:1.34rem;
      line-height:1.02;
      font-weight:800;
    }

    .bull-small-inline{
      font-size:0.72em;
      opacity:0.95;
      font-weight:700;
      letter-spacing:0.02em;
      display:inline;
      white-space:nowrap;
    }

    .bull-note{
      color:#ddd;
      font-size:0.84rem;
      line-height:1.03;
      margin-top:-2px;
    }

    .bull-note.note-small{
      font-size:0.77rem;
      line-height:1.02;
    }

    .bull-note.note-xsmall{
      font-size:0.69rem;
      line-height:1.01;
    }

    .bull-note-line{
      display:block;
      white-space:normal;
      overflow:visible;
      text-overflow:unset;
      word-break:break-word;
      margin:0;
    }

    .bull-note a{
      color:#ddd;
      text-decoration:underline;
    }

    .rank-name{
      color:#f1c40f;
      font-size:0.9rem;
      font-weight:800;
      line-height:1.0;
      white-space:normal;
      word-break:break-word;
      margin-bottom:2px;
      padding:0 1px;
    }

    .match-time-placeholder{
      color:#bbb;
      font-size:0.74rem;
      line-height:1.02;
      white-space:nowrap;
      min-height:1.05em;
    }

    .season-links{
      margin:28px auto 0;
      width:fit-content;
      max-width:100%;
    }

    .season-table{
      border-collapse:collapse;
      margin:auto;
      background:rgba(255,255,255,0.04);
    }

    .season-table td{
      border:1px solid #333;
      padding:10px 14px;
      text-align:center;
      vertical-align:middle;
      background:rgba(255,255,255,0.03);
    }

    .season-title{
      font-weight:800;
      color:#fff;
      line-height:1.5;
      min-width:90px;
    }

    .season-link{
      color:#7fb3ff;
      text-decoration:underline;
      font-weight:700;
    }

    .season-current{
      color:#fff;
      font-weight:800;
    }

    .error{
      text-align:center;
      color:#ff8080;
      margin-top:24px;
    }

    @media (max-width:700px){
      body{
        padding:10px 2px 24px;
      }

      .top-nav{
        gap:4px;
        margin:0 auto 12px;
      }

      .top-nav a{
        padding:9px 4px;
        font-size:0.62rem;
      }

      h1{
        font-size:1rem;
        line-height:1.7;
        margin:8px 0 16px;
      }

      .meta-row{
        grid-template-columns:58px 1fr;
      }

      .meta-label{
        font-size:0.68rem;
        padding:8px 6px;
      }

      .meta-value{
        font-size:0.66rem;
        padding:8px 6px;
        line-height:1.45;
      }

      th{
        font-size:0.58rem;
        padding:8px 2px;
      }

      td.area{
        font-size:0.46rem;
        padding:8px 1px;
        line-height:1.0;
      }

      td.east, td.west{
        padding:6px 2px 3px;
      }

      td.rank{
        padding:8px 1px;
      }

      .champion-tag{
        left:4px;
        top:4px;
        font-size:0.34rem;
      }

      .challenger-tag{
        right:4px;
        top:4px;
        font-size:0.34rem;
      }

      .subtext{
        font-size:0.38rem;
        line-height:1.01;
        margin-bottom:1px;
      }

      .bull-name{
        margin-bottom:2px;
        min-height:auto;
      }

      .bull-top{
        font-size:0.50rem;
        line-height:1.02;
      }

      .bull-middle{
        font-size:0.44rem;
        line-height:1.02;
      }

      .bull-main{
        font-size:0.73rem;
        line-height:1.03;
      }

      .bull-small-inline{
        font-size:0.72em;
      }

      .bull-note{
        font-size:0.40rem;
        line-height:1.03;
        margin-top:-1px
      }

      .bull-note.note-small{
        font-size:0.36rem;
      }

      .bull-note.note-xsmall{
        font-size:0.32rem;
      }

      .rank-name{
        font-size:0.54rem;
        line-height:0.96;
        margin-bottom:1px;
      }

      .match-time-placeholder{
        font-size:0.42rem;
        line-height:1.0;
      }

      .season-table td{
        padding:8px 10px;
        font-size:0.72rem;
      }

      .season-title{
        min-width:72px;
      }
      .owner-line{
        display:block;
        font-size:0.85em;
        overflow-wrap:anywhere;
     }
      
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  
  <div class="container">
    <nav class="top-nav">
      <a href="index.html">ホーム</a>
      <a href="programitiran.html" class="active">対戦表</a>
      <a href="search.html">戦歴検索</a>
      <a href="prediction.html">予想</a>
    </nav>

    <h1 id="pageTitle">対戦表</h1>

    <div id="program-container"></div>
    
    <div class="event-meta">
      <div class="meta-row"><div class="meta-label">日時</div><div class="meta-value" id="metaDate">読み込み中...</div></div>
      <div class="meta-row"><div class="meta-label">場所</div><div class="meta-value" id="metaPlace">読み込み中...</div></div>
      <div class="meta-row"><div class="meta-label">主催</div><div class="meta-value" id="metaHost">未設定</div></div>
      <div class="meta-row"><div class="meta-label">後援</div><div class="meta-value" id="metaSupport">なし</div></div>
      <div class="meta-row"><div class="meta-label">入場料</div><div class="meta-value" id="metaPrice">未設定</div></div>
    </div>

    <div class="program-table-wrap">
      <table>
        <colgroup>
          <col class="area-col">
          <col class="side-col">
          <col class="rank-col">
          <col class="side-col">
          <col class="area-col">
        </colgroup>
        <thead>
          <tr>
            <th class="area-head">地区</th>
            <th class="east-head">東方</th>
            <th class="rank-head">番付</th>
            <th class="west-head">西方</th>
            <th class="area-head">地区</th>
          </tr>
        </thead>
        <tbody id="programBody"></tbody>
      </table>
    </div>

    <div id="seasonLinks" class="season-links"></div>

    <div class="error" id="error"></div>
  </div>

  <script>
fetch("data/programs.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("program-container");
    if (!container) return;

    container.innerHTML = "";

    data.forEach(event => {

      const block = document.createElement("div");
      block.className = "program-block";

      // 基本情報
      block.innerHTML = `
        <div class="program-header">
          <div>日時：${event.date || ""}</div>
          <div>場所：${event.place || ""}</div>
          <div>主催：${event.host || ""}</div>
          <div>入場料：${event.price || ""}</div>
        </div>
      `;

      // 試合
      if (event.matches && event.matches.length > 0) {

        const table = document.createElement("div");
        table.className = "match-table";

        event.matches.forEach(match => {

          const row = document.createElement("div");
          row.className = "match-row";

          // 東
          const east = match.east || {};
          const west = match.west || {};

          row.innerHTML = `
            <div class="east">
              <div class="name">${east.name || ""}</div>
              <div class="record">${east.record || ""}</div>
              <div class="owner">${east.owner || ""}</div>
            </div>

            <div class="rank">
              ${match.rank || ""}
            </div>

            <div class="west">
              <div class="name">${west.name || ""}</div>
              <div class="record">${west.record || ""}</div>
              <div class="owner">${west.owner || ""}</div>
            </div>
          `;

          table.appendChild(row);
        });

        block.appendChild(table);
      }

      container.appendChild(block);
    });

  })
  .catch(err => {
    console.log("エラー:", err);
  });
</script>
</body>
</html>
