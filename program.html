<script>
  const params = new URLSearchParams(location.search);
  const programId = params.get("id");

  const pageTitleEl = document.getElementById("pageTitle");
  const metaDateEl = document.getElementById("metaDate");
  const metaPlaceEl = document.getElementById("metaPlace");
  const metaHostEl = document.getElementById("metaHost");
  const metaPriceEl = document.getElementById("metaPrice");
  const bodyEl = document.getElementById("programBody");
  const errorEl = document.getElementById("error");

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function formatJapaneseDate(dateStr){
    if(!dateStr) return "";
    const [y, m, d] = dateStr.split("-");
    return `${Number(y)}年${Number(m)}月${Number(d)}日`;
  }

  function getProgramTitle(program){
    if(program && program.title) return program.title;
    if(program && program.date) return `${formatJapaneseDate(program.date)} 闘牛大会`;
    return "対戦表";
  }

  function normalize(str) {
    return String(str || "")
      .replace(/\s+/g, "")
      .replace(/[（）()]/g, "")
      .trim();
  }

  function getBullSearchTargets(bull) {
    const targets = [];

    if (bull.display_name) targets.push(bull.display_name);
    if (bull.name) targets.push(bull.name);
    if (bull.exact_title) targets.push(bull.exact_title);

    if (Array.isArray(bull.former_names)) {
      bull.former_names.forEach(name => {
        if (name) {
          targets.push(name);
          targets.push("元 " + name);
          targets.push("元" + name);
        }
      });
    }

    return [...new Set(targets.map(normalize).filter(Boolean))];
  }

  function findBullIdByName(name, bulls) {
    const target = normalize(name);
    const found = bulls.find(bull => getBullSearchTargets(bull).includes(target));
    return found ? found.id : null;
  }

  function makeRecordHtml(name, text, bulls){
    const noteText = String(text || "").trim();

    if(!noteText){
      return "";
    }

    if(noteText.includes("デビュー戦")){
      return `<div class="bull-note">${escapeHtml(noteText)}</div>`;
    }

    const hasRecord =
      /[0-9０-９]+勝/.test(noteText) ||
      /[0-9０-９]+敗/.test(noteText) ||
      /引分/.test(noteText);

    if(!hasRecord){
      return `<div class="bull-note">${escapeHtml(noteText)}</div>`;
    }

    const bullId = findBullIdByName(name, bulls);

    if (!bullId) {
      return `<div class="bull-note">${escapeHtml(noteText)}</div>`;
    }

    return `
      <div class="bull-note">
        <a href="bull.html?id=${encodeURIComponent(bullId)}">
          ${escapeHtml(noteText)}
        </a>
      </div>
    `;
  }

  Promise.all([
    fetch("data/programs.json").then(res => res.json()),
    fetch("data/matches.json").then(res => res.json()),
    fetch("data/bulls.json").then(res => res.json())
  ])
  .then(([programs, matches, bulls]) => {
    const program = programs.find(p => p.id === programId);
    const list = matches.filter(m => m.program === programId);

    if (!programId) {
      errorEl.textContent = "大会IDがありません。";
      return;
    }

    if (program) {
      pageTitleEl.textContent = getProgramTitle(program);
      metaDateEl.textContent = formatJapaneseDate(program.date) || "未設定";
      metaPlaceEl.textContent = program.location || program.place || "未設定";
      metaHostEl.textContent = program.host || "未設定";
      metaPriceEl.textContent = program.price || "未設定";
    } else {
      pageTitleEl.textContent = `${programId} 対戦表`;
      metaDateEl.textContent = "未設定";
      metaPlaceEl.textContent = "未設定";
    }

    if (list.length === 0) {
      bodyEl.innerHTML = `
        <tr>
          <td colspan="5" style="padding:20px;color:#ff8080;">この大会の対戦データはまだありません。</td>
        </tr>
      `;
      return;
    }

    const html = list.map(match => {
      const eastArea = match.east_area || match.eastArea || match.left_area || "";
      const westArea = match.west_area || match.westArea || match.right_area || "";
      const eastName = match.east || match.winner || "";
      const westName = match.west || match.loser || "";
      const rank = match.rank || "VS";
      const eastSub = match.east_sub || match.eastSub || "";
      const eastNote = match.east_note || match.eastNote || "";
      const westSub = match.west_sub || match.westSub || "";
      const westNote = match.west_note || match.westNote || "";

      return `
        <tr>
          <td class="area">${escapeHtml(eastArea)}</td>

          <td class="east">
            ${eastSub ? `<div class="subtext">${escapeHtml(eastSub)}</div>` : ``}
            <div class="bull-name">${escapeHtml(eastName)}</div>
            ${makeRecordHtml(eastName, eastNote, bulls)}
          </td>

          <td class="rank">
            <div class="rank-name">${escapeHtml(rank)}</div>
            <div class="match-time-placeholder">│ --:-- │</div>
          </td>

          <td class="west">
            ${westSub ? `<div class="subtext">${escapeHtml(westSub)}</div>` : ``}
            <div class="bull-name">${escapeHtml(westName)}</div>
            ${makeRecordHtml(westName, westNote, bulls)}
          </td>

          <td class="area">${escapeHtml(westArea)}</td>
        </tr>
      `;
    }).join("");

    bodyEl.innerHTML = html;
  })
  .catch(err => {
    errorEl.textContent = "データの読み込みに失敗しました。";
    console.error(err);
  });
</script>
