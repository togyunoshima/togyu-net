<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対戦表 | 徳之島闘牛サイト</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      padding:14px 8px 40px;
      background:#050505;
      color:#eee;
      font-family:'Kaisei Tokumin', serif;
      position:relative;
      min-height:100vh;
    }

    .bg-overlay{
      position:fixed;
      inset:0;
      background-image:url('IMG_8395.jpg');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      opacity:0.18;
      filter:grayscale(100%);
      z-index:-1;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    .top-nav{
      max-width:1100px;
      margin:0 auto 18px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }

    .top-nav a{
      display:block;
      text-align:center;
      padding:12px 8px;
      background:rgba(20,20,20,0.72);
      backdrop-filter:blur(4px);
      border:1px solid #333;
      color:#fff;
      text-decoration:none;
      font-weight:800;
      font-size:0.92rem;
    }

    .top-nav a:hover{
      background:#e60000;
    }

    .top-nav a.active{
      background:#1a1a1a;
      border-color:#f1c40f;
      color:#f1c40f;
    }

    h1{
      text-align:center;
      font-family:'Yuji Syuku', serif;
      font-size:clamp(1.5rem, 4.8vw, 3rem);
      color:#fff;
      margin:10px 0 22px;
      text-shadow:
        3px 3px 0 #e60000,
        -1px -1px 0 #e60000,
        1px -1px 0 #e60000,
        -1px 1px 0 #e60000,
        1px 1px 0 #e60000;
      line-height:1.55;
      white-space:normal;
      word-break:keep-all;
      overflow-wrap:anywhere;
      letter-spacing:0.02em;
    }

    .event-meta{
      background:rgba(20,20,20,0.8);
      border:1px solid #222;
      margin-bottom:20px;
    }

    .meta-row{
      display:grid;
      grid-template-columns:92px 1fr;
      border-bottom:1px solid #333;
    }

    .meta-row:last-child{
      border-bottom:none;
    }

    .meta-label{
      background:rgba(20,20,20,0.72);
      backdrop-filter:blur(4px);
      color:#f1c40f;
      font-weight:800;
      padding:12px;
      font-size:0.9rem;
    }

    .meta-value{
      padding:12px;
      color:#fff;
      font-size:0.92rem;
      line-height:1.6;
      white-space:normal;
      word-break:break-word;
    }

    .program-table-wrap{
      background:rgba(20,20,20,0.8);
      border:1px solid #222;
      overflow-x:hidden;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    th, td{
      border:1px solid #333;
      text-align:center;
      vertical-align:top;
      padding:0;
    }

    th{
      background:rgba(20,20,20,0.72);
      backdrop-filter:blur(4px);
      color:#fff;
      font-weight:800;
      padding:12px 2px;
      font-size:0.92rem;
    }

    th.area-head{
      background:#222;
      color:#fff;
      width:8.5%;
    }

    th.east-head{
      background:#b60000;
      width:37%;
    }

    th.rank-head{
      background:#222;
      color:#f1c40f;
      width:9%;
    }

    th.west-head{
      background:#d9d9d9;
      color:#222;
      width:37%;
    }

    td.area{
      background:#0a0a0a;
      color:#fff;
      font-weight:700;
      font-size:0.88rem;
      width:8.5%;
      padding:12px 2px 8px;
      line-height:1.2;
      word-break:break-word;
    }

    td.east, td.west{
      width:37%;
      background:#050505;
      padding:8px 4px 10px;
    }

    td.rank{
      width:9%;
      background:#0f0f0f;
      padding:8px 0 8px;
    }

    .side-tag{
      display:block;
      min-height:0.82rem;
      margin-bottom:4px;
      font-weight:800;
      line-height:1.05;
      letter-spacing:0.02em;
    }

    .side-tag.east{
      color:#e60000;
      text-align:left;
      font-size:0.58rem;
    }

    .side-tag.west{
      color:#4da3ff;
      text-align:right;
      font-size:0.58rem;
    }

    .subtext{
      color:#f1c40f;
      font-size:0.82rem;
      line-height:1.16;
      margin-bottom:5px;
      font-weight:700;
      white-space:normal;
      word-break:break-word;
    }

    .bull-name{
      color:#fff;
      margin-bottom:6px;
      line-height:1.05;
      white-space:normal;
      word-break:break-word;
    }

    .bull-top{
      font-size:0.98rem;
      line-height:1.05;
      font-weight:700;
    }

    .bull-middle{
      font-size:0.88rem;
      line-height:1.05;
      font-weight:700;
    }

    .bull-main{
      font-size:1.40rem;
      line-height:1.05;
      font-weight:800;
    }

    .bull-small{
      font-size:0.72em;
      opacity:0.95;
      font-weight:700;
      letter-spacing:0.02em;
    }

    .bull-note{
      color:#ddd;
      font-size:0.78rem;
      line-height:1.14;
    }

    .bull-note.note-small{
      font-size:0.70rem;
      line-height:1.12;
    }

    .bull-note.note-xsmall{
      font-size:0.63rem;
      line-height:1.10;
    }

    .bull-note-line{
      display:block;
      white-space:normal;
      word-break:break-word;
    }

    .bull-note a{
      color:#ddd;
      text-decoration:underline;
    }

    .rank-name{
      color:#f1c40f;
      font-size:0.90rem;
      font-weight:800;
      line-height:1.02;
      white-space:normal;
      word-break:break-word;
      margin-bottom:3px;
      padding:0 1px;
    }

    .match-time-placeholder{
      color:#bbb;
      font-size:0.74rem;
      line-height:1.04;
      white-space:nowrap;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:1.1em;
    }

    .season-links{
      margin:28px auto 0;
      width:fit-content;
      max-width:100%;
    }

    .season-table{
      border-collapse:collapse;
      margin:auto;
      background:rgba(255,255,255,0.04);
    }

    .season-table td{
      border:1px solid #333;
      padding:10px 14px;
      text-align:center;
      vertical-align:middle;
      background:rgba(255,255,255,0.03);
    }

    .season-title{
      font-weight:800;
      color:#fff;
      line-height:1.5;
      min-width:90px;
    }

    .season-link{
      color:#7fb3ff;
      text-decoration:underline;
      font-weight:700;
    }

    .season-current{
      color:#fff;
      font-weight:800;
    }

    .error{
      text-align:center;
      color:#ff8080;
      margin-top:24px;
    }

    .note{
      color:#888;
      text-align:center;
      margin-top:14px;
      font-size:0.8rem;
    }

    @media (max-width:700px){
      body{
        padding:10px 2px 24px;
      }

      .top-nav{
        gap:4px;
        margin:0 auto 12px;
      }

      .top-nav a{
        padding:9px 4px;
        font-size:0.62rem;
      }

      h1{
        font-size:1rem;
        line-height:1.7;
        margin:8px 0 16px;
      }

      .meta-row{
        grid-template-columns:58px 1fr;
      }

      .meta-label{
        font-size:0.68rem;
        padding:8px 6px;
      }

      .meta-value{
        font-size:0.66rem;
        padding:8px 6px;
        line-height:1.45;
      }

      th{
        font-size:0.58rem;
        padding:8px 0;
      }

      td.area{
        font-size:0.48rem;
        padding:7px 1px 5px;
        line-height:1.06;
      }

      td.east, td.west{
        padding:5px 1px 6px;
      }

      td.rank{
        padding:6px 0 5px;
      }

      .side-tag{
        min-height:0.45rem;
        margin-bottom:2px;
      }

      .side-tag.east,
      .side-tag.west{
        font-size:0.34rem;
      }

      .subtext{
        font-size:0.42rem;
        line-height:1.05;
        margin-bottom:2px;
      }

      .bull-top{
        font-size:0.50rem;
        line-height:1.02;
      }

      .bull-middle{
        font-size:0.44rem;
        line-height:1.02;
      }

      .bull-main{
        font-size:0.80rem;
        line-height:1.04;
      }

      .bull-note{
        font-size:0.40rem;
        line-height:1.04;
      }

      .bull-note.note-small{
        font-size:0.36rem;
      }

      .bull-note.note-xsmall{
        font-size:0.32rem;
      }

      .rank-name{
        font-size:0.58rem;
        line-height:0.98;
        margin-bottom:2px;
      }

      .match-time-placeholder{
        font-size:0.42rem;
        line-height:1.0;
      }

      .season-table td{
        padding:8px 10px;
        font-size:0.72rem;
      }

      .season-title{
        min-width:72px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="container">
    <nav class="top-nav">
      <a href="index.html">ホーム</a>
      <a href="programitiran.html" class="active">対戦表</a>
      <a href="search.html">戦歴検索</a>
      <a href="prediction.html">予想</a>
    </nav>

    <h1 id="pageTitle">対戦表</h1>

    <div class="event-meta">
      <div class="meta-row"><div class="meta-label">日時</div><div class="meta-value" id="metaDate">読み込み中...</div></div>
      <div class="meta-row"><div class="meta-label">場所</div><div class="meta-value" id="metaPlace">読み込み中...</div></div>
      <div class="meta-row"><div class="meta-label">主催</div><div class="meta-value" id="metaHost">未設定</div></div>
      <div class="meta-row"><div class="meta-label">後援</div><div class="meta-value" id="metaSupport">なし</div></div>
      <div class="meta-row"><div class="meta-label">入場料</div><div class="meta-value" id="metaPrice">未設定</div></div>
    </div>

    <div class="program-table-wrap">
      <table>
        <thead>
          <tr>
            <th class="area-head">地区</th>
            <th class="east-head">東方</th>
            <th class="rank-head">番付</th>
            <th class="west-head">西方</th>
            <th class="area-head">地区</th>
          </tr>
        </thead>
        <tbody id="programBody"></tbody>
      </table>
    </div>

    <div id="seasonLinks" class="season-links"></div>

    <div class="error" id="error"></div>
    <div class="note">※ 今の徳之島闘牛サイトの対戦表に近い形で表示しています。</div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const programId = String(params.get("id") || "");
    const pageTitleEl = document.getElementById("pageTitle");
    const metaDateEl = document.getElementById("metaDate");
    const metaPlaceEl = document.getElementById("metaPlace");
    const metaHostEl = document.getElementById("metaHost");
    const metaSupportEl = document.getElementById("metaSupport");
    const metaPriceEl = document.getElementById("metaPrice");
    const bodyEl = document.getElementById("programBody");
    const errorEl = document.getElementById("error");
    const seasonLinksEl = document.getElementById("seasonLinks");

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatJapaneseDate(dateStr){
      if(!dateStr) return "";
      const [y, m, d] = dateStr.split("-");
      return `${Number(y)}年${Number(m)}月${Number(d)}日`;
    }

    function formatDateTime(program){
      const dateText = formatJapaneseDate(program.date || "");
      const start = program.start_time || program.start || "";
      return start ? `${dateText}　${start}` : dateText;
    }

    function splitHostSupport(hostText){
      const text = String(hostText || "").trim();
      if(!text) return {host:"未設定", support:"なし"};

      const match = text.match(/^(.*?)(?:\s*後援[:：]\s*)(.+)$/);
      if(match){
        return {
          host: match[1].trim() || "未設定",
          support: match[2].trim() || "なし"
        };
      }
      return {host:text, support:"なし"};
    }

    function getProgramTitle(program){
      const title = (program && program.title) ? program.title : "対戦表";
      return title.replace("&", "&<br>");
    }

    function normalize(str) {
      return String(str || "").replace(/\s+/g, "").replace(/[（）()]/g, "").trim();
    }

    function normalizeRankKey(rank){
      return String(rank || "")
        .replace(/\s+/g, "")
        .replace(/[／/]/g, "")
        .trim();
    }

    function getBullSearchTargets(bull) {
      const targets = [];
      if (bull.display_name) targets.push(bull.display_name);
      if (bull.name) targets.push(bull.name);
      if (bull.exact_title) targets.push(bull.exact_title);
      if (Array.isArray(bull.former_names)) {
        bull.former_names.forEach(name => {
          if (name) {
            targets.push(name);
            targets.push("元 " + name);
            targets.push("元" + name);
          }
        });
      }
      return [...new Set(targets.map(normalize).filter(Boolean))];
    }

    function findBullIdByName(name, bulls) {
      const target = normalize(name);
      const found = bulls.find(bull => getBullSearchTargets(bull).includes(target));
      return found ? found.id : null;
    }

    function splitNote(text){
      const raw = String(text || "").trim();
      if(!raw) return [];
      const cleaned = raw.replaceAll("/", " ").replace(/\s+/g, " ").trim();
      const ownerMatch = cleaned.match(/\(?牛主[:：][^)]+\)?/);
      const owner = ownerMatch ? ownerMatch[0].trim() : "";
      let withoutOwner = cleaned;
      if (owner) withoutOwner = cleaned.replace(owner, "").trim();
      const lines = [];
      if (withoutOwner) lines.push(withoutOwner);
      if (owner) lines.push(owner);
      if (lines.length === 0) lines.push(cleaned);
      return lines.slice(0, 2);
    }

    function getNoteClass(text){
      const len = String(text || "").replace(/\s+/g, "").length;
      if(len >= 38) return "note-xsmall";
      if(len >= 24) return "note-small";
      return "";
    }

    function makeRecordHtml(name, text, bulls){
      const lines = splitNote(text);
      if(!lines.length) return "";

      const joined = lines.join(" ");
      const noteClass = getNoteClass(joined);

      const hasRecord =
        /[0-9０-９]+勝/.test(joined) ||
        /[0-9０-９]+敗/.test(joined) ||
        /引分/.test(joined);

      const currentBullId = findBullIdByName(name, bulls);

      function findBullIdFromLine(line){
        const cleaned = String(line || "")
          .replace(/[()（）]/g, "")
          .replace(/牛主[:：].*$/, "")
          .trim();

        const found = bulls.find(bull => {
          const targets = getBullSearchTargets(bull);
          return targets.some(target =>
            cleaned.includes(target) || target.includes(cleaned)
          );
        });

        return found ? found.id : null;
      }

      return `
        <div class="bull-note ${noteClass}">
          ${lines.map(line => {
            const safeLine = escapeHtml(line);

            if (line.includes("牛主")) {
              return `<span class="bull-note-line">${safeLine}</span>`;
            }

            if (/デビュー戦/.test(line)) {
              return `<span class="bull-note-line">${safeLine}</span>`;
            }

            if (hasRecord) {
              if (currentBullId && (/[0-9０-９]+勝/.test(line) || /[0-9０-９]+敗/.test(line) || /引分/.test(line))) {
                return `<span class="bull-note-line"><a href="bull.html?id=${encodeURIComponent(currentBullId)}">${safeLine}</a></span>`;
              }
              return `<span class="bull-note-line">${safeLine}</span>`;
            }

            if (/元/.test(line)) {
              const formerBullId = findBullIdFromLine(line);
              if (formerBullId) {
                return `<span class="bull-note-line"><a href="bull.html?id=${encodeURIComponent(formerBullId)}">${safeLine}</a></span>`;
              }
            }

            return `<span class="bull-note-line">${safeLine}</span>`;
          }).join("")}
        </div>
      `;
    }

    function formatRank(rank){
      const text = String(rank || "").trim();
      if(!text) return "VS";
      return escapeHtml(text)
        .replaceAll(" / ", "<br>")
        .replaceAll("/", "<br>")
        .replace(/ +/g, "<br>");
    }

    function formatMonthDay(date){
      const [,m,d] = date.split("-");
      return `${Number(m)}月${Number(d)}日`;
    }

    function renderSeasonLinks(program, programs, pageType){
      if(!program || !program.date){
        seasonLinksEl.innerHTML = "";
        return;
      }

      const [year,month] = program.date.split("-");
      const season = programs
        .filter(p=>{
          if(!p.date) return false;
          const [y,m] = p.date.split("-");
          return y===year && m===month;
        })
        .sort((a,b)=>a.date.localeCompare(b.date));

      if(!season.length){
        seasonLinksEl.innerHTML = "";
        return;
      }

      const header = `<td class="season-title" rowspan="2">${year}年<br>${Number(month)}月場所</td>`;

      const programRow = season.map(p=>{
        const label = `${formatMonthDay(p.date)}`;
        const current = String(p.id)===String(program.id) && pageType==="program";
        return current
          ? `<td><span class="season-current">${label}</span></td>`
          : `<td><a class="season-link" href="program.html?id=${encodeURIComponent(p.id)}">${label}</a></td>`;
      }).join("");

      const resultRow = season.map(p=>{
        const current = String(p.id)===String(program.id) && pageType==="result";
        return current
          ? `<td><span class="season-current">結果</span></td>`
          : `<td><a class="season-link" href="result.html?id=${encodeURIComponent(p.id)}">結果</a></td>`;
      }).join("");

      seasonLinksEl.innerHTML = `<table class="season-table"><tr>${header}${programRow}</tr><tr>${resultRow}</tr></table>`;
    }

    function isChampionMatch(rank){
      const key = normalizeRankKey(rank);
      return [
        "全島一優勝旗争奪戦",
        "中量級優勝旗争奪戦",
        "軽量級優勝旗争奪戦",
        "ミニ軽量級優勝旗争奪戦"
      ].includes(key);
    }

    function renderSideTag(rank, side){
      if(!isChampionMatch(rank)) return "";
      return side === "east"
        ? `<div class="side-tag east">チャンピオン</div>`
        : `<div class="side-tag west">チャレンジャー</div>`;
    }

    function formatBullName(name){
      if(!name) return "";

      let safe = escapeHtml(name);

      safe = safe.replace(/([^\s])\((.*?)\)([^\s])/g,
        '$1<br><span class="bull-small">($2)</span><br>$3'
      );

      safe = safe.replace(/([^\s])[〜~](.*?)[〜~]([^\s])/g,
        '$1<br><span class="bull-small">〜$2〜</span><br>$3'
      );

      safe = safe.replace(/([^\s])\s+([A-Za-z0-9★☆'&.\-]+)\s+([^\s])/g,
        '$1<br><span class="bull-small">$2</span><br>$3'
      );

      safe = safe.replace(/ /g, "<br>");

      const lines = safe.split("<br>").filter(Boolean);

      if(lines.length >= 2){
        const first = `<div class="bull-top">${lines[0]}</div>`;
        const last = `<div class="bull-main">${lines[lines.length - 1]}</div>`;
        const middle = lines.slice(1, -1).map(line => `<div class="bull-middle">${line}</div>`).join("");
        return first + middle + last;
      }

      return `<div class="bull-main">${safe}</div>`;
    }

    Promise.all([
      fetch("data/programs.json").then(res => res.json()),
      fetch("data/matches.json").then(res => res.json()),
      fetch("data/bulls.json").then(res => res.json())
    ])
    .then(([programs, matches, bulls]) => {
      const program = programs.find(p => String(p.id) === programId);
      const list = matches.filter(m => String(m.program) === programId);

      if (!programId) {
        errorEl.textContent = "大会IDがありません。";
        return;
      }

      if (program) {
        const hs = splitHostSupport(program.host || "");
        pageTitleEl.innerHTML = getProgramTitle(program);
        metaDateEl.textContent = formatDateTime(program) || "未設定";
        metaPlaceEl.textContent = program.location || program.place || "未設定";
        metaHostEl.textContent = hs.host;
        metaSupportEl.textContent = hs.support;
        metaPriceEl.textContent = program.price || "未設定";
      }

      renderSeasonLinks(program, programs, "result");

      if (list.length === 0) {
        bodyEl.innerHTML = `<tr><td colspan="5" style="padding:20px;color:#ff8080;">この大会の結果データはまだありません。</td></tr>`;
        return;
      }

      bodyEl.innerHTML = list.map(match => {
        const eastName = match.east || "";
        const westName = match.west || "";
        const winner = match.winner || "";
        const isDraw = match.draw === true || match.result === "draw";

        let winnerSide = "";
        if (!isDraw && normalize(winner) === normalize(eastName)) {
          winnerSide = "east";
        } else if (!isDraw && normalize(winner) === normalize(westName)) {
          winnerSide = "west";
        }

        return `
          <tr>
            <td class="area">${escapeHtml(match.east_area || "")}</td>
            <td class="east">
              ${renderSideTag(match.rank || "", "east")}
              ${(match.east_sub || "") ? `<div class="subtext">${escapeHtml(match.east_sub)}</div>` : ``}
              <div class="bull-name">${formatBullName(eastName)}</div>
              ${makeRecordHtml(eastName, match.east_note || "", bulls)}
            </td>
            <td class="rank">
              <div class="rank-name">${formatRank(match.rank || "VS")}</div>
              ${formatCenterLine(match.time || "不戦勝", winnerSide, isDraw)}
            </td>
            <td class="west">
              ${renderSideTag(match.rank || "", "west")}
              ${(match.west_sub || "") ? `<div class="subtext">${escapeHtml(match.west_sub)}</div>` : ``}
              <div class="bull-name">${formatBullName(westName)}</div>
              ${makeRecordHtml(westName, match.west_note || "", bulls)}
            </td>
            <td class="area">${escapeHtml(match.west_area || "")}</td>
          </tr>
        `;
      }).join("");
    })
    .catch(err => {
      errorEl.textContent = "データの読み込みに失敗しました。";
      console.error(err);
    });
  </script>
</body>
</html>
